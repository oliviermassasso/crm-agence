function calcBaseCommission(contract) {
  // Annulé = commission 0 dans tous les cas
  if(contract.status==='ANNULE') return 0;
  // Commission manuelle = prioritaire (0€ explicite inclus)
  if(contract.manual_commission!==null&&contract.manual_commission!==undefined){
    const v=parseFloat(contract.manual_commission);
    return isNaN(v)?0:v;
  }
  const g=GRILLE_2026[contract.contract_type];
  if(!g) return 0;
  const mt=contract.mono_type||'';
  const isSante=TYPE_SANTE.includes(contract.contract_type);
  const isPro=TYPE_PRO.includes(contract.contract_type);
  // Mono contrat = 0 sauf santé/pro qui ont décote
  if(mt==='mono'&&!isSante&&!isPro) return 0;
  let rate=g.rate;
  if(mt==='mono_sante'&&isSante) rate=Math.max(0,rate-0.01);
  if(mt==='mono_pro'&&isPro) rate=Math.max(0,rate-0.01);
  if(g.fixed) return rate;
  return Math.round((contract.annual_premium||0)*rate*100)/100;
}

function isEligibleForCommission(c) {
  if(c.status==='ANNULE') return false;
  const dt=c.document_tracking||{};
  if(dt.has_problem) return false;
  if(!dt.rented_signed) return false;
  if(!dt.contract_nr_ok) return false;
  if(!dt.kyc_compliant) return false;
  if(!dt.docs_complete) return false;
  if(!dt.effect_date_ok) return false;
  if(dt.payment_status!=='paye') return false;
  return true;
}

function isConforme(c) {
  if(c.status==='ANNULE') return true;
  const dt=c.document_tracking||{};
  if(dt.has_problem) return false;
  if(!dt.rented_signed||!dt.kyc_compliant||!dt.docs_complete) return false;
  return true;
}

function calcMonthCommissions(contracts,profiles,year,month,paidAtMap) {
  // Mois précédent
  const prevMonth=month===1?12:month-1;
  const prevYear=month===1?year-1:year;

  const monthContracts=contracts.filter(function(c){
    const dt=c.document_tracking||{};
    if(!dt.eligible_since) return false;
    const d=new Date(dt.eligible_since);
    const consId=c.conseiller_id;

    // Contrat éligible dans ce mois
    if(d.getFullYear()===year&&d.getMonth()+1===month){
      // Si mois gelé : exclure après paid_at
      const cutoff=paidAtMap&&paidAtMap[consId]&&paidAtMap[consId][month];
      if(cutoff&&new Date(dt.eligible_since)>new Date(cutoff)) return false;
      return true;
    }

    // Contrat éligible dans le mois précédent MAIS après le paid_at de ce mois → déborde sur ce mois
    if(d.getFullYear()===prevYear&&d.getMonth()+1===prevMonth){
      const prevCutoff=paidAtMap&&paidAtMap[consId]&&paidAtMap[consId][prevMonth];
      if(prevCutoff&&new Date(dt.eligible_since)>new Date(prevCutoff)) return true;
    }

    return false;
  });

  const results={};
  profiles.forEach(function(p){
    if(p.role==='direction') return;
    const mine=monthContracts.filter(function(c){return c.conseiller_id===p.id;});

    // Taux non-conformité sur TOUS les dossiers ENCOURS du conseiller
    const allEncours=contracts.filter(function(c){return c.conseiller_id===p.id&&c.status==='ENCOURS';});
    const nbNonConf=allEncours.filter(function(c){return !isConforme(c);}).length;
    const tauxNC=allEncours.length>0?nbNonConf/allEncours.length:0;

    // Base commission par contrat — tous éligibles par définition
    let baseCom=0;
    mine.forEach(function(c){
      baseCom+=calcBaseCommission(c);
    });

    // Bonifications mensuelles sur contrats éligibles (= tous dans mine)
    const signed=mine;
    const caIardAxa=signed.filter(function(c){return TYPE_IARD_AXA.includes(c.contract_type);}).reduce(function(s,c){return s+(c.annual_premium||0);},0);
    const caMrh=signed.filter(function(c){return TYPE_MRH.includes(c.contract_type);}).reduce(function(s,c){return s+(c.annual_premium||0);},0);
    const caPjPa=signed.filter(function(c){return TYPE_PJ_PA.includes(c.contract_type);}).reduce(function(s,c){return s+(c.annual_premium||0);},0);
    const caSanteTns=signed.filter(function(c){return TYPE_SANTE_TNS.includes(c.contract_type);}).reduce(function(s,c){return s+(c.annual_premium||0);},0);
    const nbSigned=signed.length;

    // Bonifications exclues pour l'instant — traitées dans le module Salaires (Sprint 6)
    const bonif=0;

    // Décote non-conformité exclue pour l'instant — traitée dans le module Salaires (Sprint 6)
    const decote=0;
    const totalCom=Math.round(baseCom*100)/100;

    results[p.id]={
      conseiller:p,
      contracts:mine,
      baseCom:Math.round(baseCom*100)/100,
      bonif:0,
      tauxNC:Math.round(tauxNC*10000)/100,
      decote:Math.round(decote*10000)/100,
      totalCom,
    };
  });
  return results;
}

    (msgs.data||[]).forEach(function(m){if(!lmm[m.contract_id]) lmm[m.contract_id]=m.created_at;});
    setLastMsgMap(lmm);
    const rs=await cl.from('message_reads').select('contract_id,read_at').eq('user_id',p.id);
    const rm={};
    (rs.data||[]).forEach(function(r){rm[r.contract_id]=r.read_at;});
    setReads(rm);
  },[]);

  const login=async function(){
    setLe('');setLl(true);
    try{
      const cl=window.supabase.createClient(SB_URL,SB_KEY);
      const auth=await cl.auth.signInWithPassword({email:lf.email,password:lf.password});
      if(auth.error){setLe(auth.error.message);setLl(false);return;}
      const prof=await cl.from('profiles').select('*').eq('id',auth.data.user.id).single();
      if(!prof.data){setLe('Profil introuvable.');setLl(false);return;}
      setSb(cl);setProfile(prof.data);setActive(NAV[prof.data.role][0].id);
      loadUserPrefs(prof.data.id);
      await load(cl,prof.data);
    }catch(e){setLe('Erreur : '+e.message);}
    setLl(false);
  };

  const logout=async function(){if(sb)await sb.auth.signOut();setProfile(null);setSb(null);setContracts([]);setActive(null);setReads({});setLastMsgMap({});setSelected(null);setLf({email:'',password:''});};
  const refresh=useCallback(function(){if(sb&&profile)load(sb,profile,selected&&selected.id);},[sb,profile,load,selected]);
  const markRead=useCallback(async function(cid){
    if(!sb||!profile)return;
    const now=new Date().toISOString();
    await sb.from('message_reads').upsert({user_id:profile.id,contract_id:cid,read_at:now},{onConflict:'user_id,contract_id'});
    setReads(function(r){return Object.assign({},r,{[cid]:now});});
  },[sb,profile]);

  if(!profile) return(
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#f3f4f6'}}>
      <div style={{width:'100%',maxWidth:'380px',padding:'16px'}}>
        <div style={{textAlign:'center',marginBottom:'28px'}}>
          <div style={{fontSize:'22px',fontWeight:600,marginBottom:'4px'}}>CRM Agence</div>
          <div style={{fontSize:'13px',color:'#666'}}>Gestion commerciale · Assurance AXA</div>
        </div>
        <div className="card" style={{padding:'28px'}}>
          <div className="fg"><label>Email</label><input type="email" value={lf.email} onChange={function(e){setLf(function(f){return Object.assign({},f,{email:e.target.value});});}} placeholder="prenom.nom@agence.fr" onKeyDown={function(e){if(e.key==='Enter')login();}}/></div>
          <div className="fg"><label>Mot de passe</label><input type="password" value={lf.password} onChange={function(e){setLf(function(f){return Object.assign({},f,{password:e.target.value});});}} placeholder="••••••••" onKeyDown={function(e){if(e.key==='Enter')login();}}/></div>
          {le&&<div style={{background:'#fef2f2',color:'#b91c1c',border:'1px solid #fecaca',padding:'10px 14px',borderRadius:'8px',fontSize:'13px',marginBottom:'14px'}}>{le}</div>}
          <button className="bp" onClick={login} disabled={ll} style={{width:'100%',padding:'11px'}}>{ll?'Connexion…':'Se connecter'}</button>
        </div>
      </div>
    </div>
  );

  const nav=NAV[profile.role]||[];
  const rc=RC[profile.role];
  const ini=(profile.full_name||'?').split(' ').map(function(w){return w[0];}).join('').slice(0,2).toUpperCase();
  const comId=profile.role==='conseiller'?'mes-commissions':'commissions';

  return(
    <div style={{display:'flex',height:'100vh',overflow:'hidden'}}>
      <div style={{width:'220px',background:'#fff',borderRight:'1px solid #e5e7eb',display:'flex',flexDirection:'column',flexShrink:0}}>
        <div style={{padding:'18px 20px 14px',borderBottom:'1px solid #e5e7eb'}}>
          <div style={{fontSize:'15px',fontWeight:600}}>CRM Agence</div>
          <div style={{fontSize:'11px',color:'#999',marginTop:'2px'}}>Assurance AXA</div>
        </div>
        <nav style={{flex:1,padding:'10px 0',overflowY:'auto'}}>
          {nav.map(function(n){return(
            <div key={n.id} onClick={function(){setActive(n.id);setSelected(null);}} style={{display:'flex',alignItems:'center',gap:'10px',padding:'9px 20px',cursor:'pointer',fontSize:'13.5px',fontWeight:active===n.id?500:400,color:active===n.id?'#1d4ed8':'#555',background:active===n.id?'#eff6ff':'transparent',borderRight:'2px solid '+(active===n.id?'#1d4ed8':'transparent')}}>
              <span style={{width:'16px',textAlign:'center',flexShrink:0}}>{n.icon}</span>{n.label}
            </div>
          );})}
        </nav>
        <div style={{padding:'14px 20px',borderTop:'1px solid #e5e7eb'}}>
          <div style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'10px'}}>
            <div style={{width:'30px',height:'30px',borderRadius:'50%',background:rc.bg,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'11px',fontWeight:600,color:rc.tx,flexShrink:0}}>{ini}</div>
            <div style={{minWidth:0}}>
              <div style={{fontSize:'13px',fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{profile.full_name}</div>
              <div style={{fontSize:'11px',color:'#999'}}>{RL[profile.role]}</div>
            </div>
          </div>
          <button onClick={logout} style={{width:'100%',fontSize:'12px',padding:'6px'}}>Déconnexion</button>
        </div>
      </div>
      <div style={{flex:1,overflow:'auto',background:'#f9fafb'}}>
        {active==='saisir-contrat'&&<FormContrat sb={sb} profile={profile} profiles={profiles} onSaved={function(){refresh();setActive(profile.role==='conseiller'?'mes-dossiers':'suivi-dossiers');}}/>}
        {(active==='suivi-dossiers'||active==='mes-dossiers')&&<SuiviDossiers contracts={contracts} profile={profile} profiles={profiles} reads={reads} lastMsgMap={lastMsgMap} sort={sort} setSort={setSortP} fCons={fCons} setFCons={setFConsP} fYear={fYear} setFYear={setFYearP} fMonth={fMonth} setFMonth={setFMonthP} fType={fType} setFType={setFTypeP} fStat={fStat} setFStat={setFStatP} fDoss={fDoss} setFDoss={setFDossP} fPay={fPay} setFPay={setFPayP} fDup={fDup} setFDup={setFDupP} search={search} setSearch={setSearch} onSelect={function(c){setSelected(c);markRead(c.id);}} onNew={function(){setActive('saisir-contrat');}}/>}
        {active==='tableau-bord'&&<TableauBord contracts={contracts} profiles={profiles}/>}
        {(active==='commissions'||active==='mes-commissions')&&<Commissions contracts={contracts} profiles={profiles} profile={profile} sb={sb} onSelect={function(c){setSelected(c);markRead(c.id);}} onRefresh={refresh}/>}
        {!['saisir-contrat','suivi-dossiers','mes-dossiers','tableau-bord','commissions','mes-commissions'].includes(active)&&<Placeholder nav={nav} active={active}/>}
      </div>
      {selected&&<DetailPanel key={selected.id} contract={selected} profile={profile} profiles={profiles} sb={sb} onClose={function(){setSelected(null);}} onRefresh={refresh}/>}
    </div>
  );
}

/* ══ COMMISSIONS ══ */
function Commissions({contracts,profiles,profile,sb,onSelect,onRefresh}){
  const now=new Date();
  const [year,setYear]=useState(now.getFullYear());
  const [month,setMonth]=useState(now.getMonth()+1);
  const [selCons,setSelCons]=useState(profile.role==='conseiller'?profile.id:'');
  const [comSearch,setComSearch]=useState('');
  const [payments,setPayments]=useState({});
  const [saving,setSaving]=useState(false);
  const [checked,setChecked]=useState({});
  const canDir=profile.role==='direction';
  const isCollab=profile.role==='conseiller';
  function toggleCheck(id){setChecked(function(p){return Object.assign({},p,{[id]:!p[id]});});}

  const bsLabel=MONTHS[month-1]+' '+year;

  const loadPayments=useCallback(async function(){
    const res=await sb.from('commission_payments').select('*').eq('year',year);
    const pm={};
    (res.data||[]).forEach(function(p){
      if(!pm[p.conseiller_id]) pm[p.conseiller_id]={};
      pm[p.conseiller_id][p.month]=p;
    });
    setPayments(pm);
  },[sb,year]);

  useEffect(function(){loadPayments();},[loadPayments]);

  // Map conseiller_id -> {month: paid_at} pour tous les mois gelés
  const paidAtMap={};
  Object.keys(payments).forEach(function(cid){
    Object.keys(payments[cid]).forEach(function(m){
      const p=payments[cid][m];
      if(p.frozen&&p.paid_at){
        if(!paidAtMap[cid]) paidAtMap[cid]={};
        paidAtMap[cid][parseInt(m)]=p.paid_at;
      }
    });
  });

  const computed=calcMonthCommissions(contracts,profiles,year,month,paidAtMap);

  const displayProfiles=isCollab
    ? profiles.filter(function(p){return p.id===profile.id;})
    : profiles.filter(function(p){return p.role!=='direction';});

  const filtered=selCons&&!isCollab
    ? displayProfiles.filter(function(p){return p.id===selCons;})
    : displayProfiles;

  async function savePayment(consId,field,value){
    setSaving(true);
    const existing=payments[consId]&&payments[consId][month]?payments[consId][month]:null;
    const comp=computed[consId]||{};
    const isPayingNow=field==='paid'&&value===true;
    const isUnpaying=field==='paid'&&value===false;

    if(isPayingNow){
      const frozenIds=(comp.contracts||[]).map(function(c){return c.id;});
      const update={
        paid:true,frozen:true,
        base_com:comp.baseCom||0,
        bonifications:comp.bonif||0,
        decote_rate:comp.decote||0,
        total_com:comp.totalCom||0,
        frozen_contract_ids:frozenIds.length>0?frozenIds:null,
        bs_month:existing&&existing.bs_month?existing.bs_month:bsLabel,
        paid_at:new Date().toISOString(),
      };
      let res;
      if(existing) res=await sb.from('commission_payments').update(update).eq('id',existing.id);
      else res=await sb.from('commission_payments').insert(Object.assign({},update,{conseiller_id:consId,year,month}));
      if(res.error){console.error('savePayment error',res.error);setSaving(false);return;}
      if(frozenIds.length>0){
        await sb.from('contracts').update({status:'PAYE'}).in('id',frozenIds);
      }
    } else if(isUnpaying){
      // Dégeler : remettre les contrats en ENCOURS
      const frozenIds=(existing&&existing.frozen_contract_ids)||[];
      if(frozenIds.length>0){
        await sb.from('contracts').update({status:'ENCOURS'}).in('id',frozenIds);
      }
      await sb.from('commission_payments').update({paid:false,frozen:false,frozen_contract_ids:null}).eq('id',existing.id);
    } else {
      // Autre champ (bs_month, frozen toggle)
      const data={conseiller_id:consId,year,month,base_com:comp.baseCom||0,bonifications:comp.bonif||0,decote_rate:comp.decote||0,total_com:comp.totalCom||0,[field]:value};
      if(existing) await sb.from('commission_payments').update({[field]:value}).eq('id',existing.id);
      else await sb.from('commission_payments').insert(data);
    }
    await loadPayments();
    onRefresh&&onRefresh();
    setSaving(false);
  }

  return(
    <div style={{padding:'0',maxWidth:'1000px'}}>
      <div style={{position:'sticky',top:0,zIndex:10,background:'#f9fafb',padding:'20px 32px 14px',borderBottom:'1px solid #e5e7eb',marginBottom:'22px',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:'12px'}}>
        <div>
          <div style={{fontSize:'22px',fontWeight:600,marginBottom:'2px'}}>{isCollab?'Mes commissions':'Commissions'}</div>
          <div style={{fontSize:'13px',color:'#666'}}>Grille 2026 · {MONTHS[month-1]} {year}</div>
        </div>
        <div style={{display:'flex',gap:'8px',flexWrap:'wrap',alignItems:'center'}}>
          <input value={comSearch} onChange={function(e){setComSearch(e.target.value);}} placeholder="Client ou n° contrat…" style={{maxWidth:'180px',padding:'6px 10px'}}/>
          {!isCollab&&(
            <select value={selCons} onChange={function(e){setSelCons(e.target.value);}} style={{width:'auto',padding:'6px 10px'}}>
              <option value="">Tous les conseillers</option>
              {profiles.filter(function(p){return p.role!=='direction';}).map(function(p){return <option key={p.id} value={p.id}>{p.full_name}</option>;})}
            </select>
          )}
          <select value={month} onChange={function(e){setMonth(parseInt(e.target.value));}} style={{width:'auto',padding:'6px 10px'}}>
            {MONTHS.map(function(ml,i){return <option key={i} value={i+1}>{ml}</option>;})}
          </select>
          <select value={year} onChange={function(e){setYear(parseInt(e.target.value));}} style={{width:'auto',padding:'6px 10px'}}>
            {[2021,2022,2023,2024,2025,2026].map(function(y){return <option key={y} value={y}>{y}</option>;})}
          </select>
        </div>
      </div>
      <div style={{padding:'0 32px 28px'}}>

      {filtered.map(function(p){
        const comp=computed[p.id]||{baseCom:0,bonif:0,tauxNC:0,decote:0,totalCom:0,contracts:[]};
        const pay=(payments[p.id]&&payments[p.id][month])||{};
        const isFrozen=!!pay.frozen;

        const displayBase=isFrozen?pay.base_com:comp.baseCom;
        const displayBonif=isFrozen?pay.bonifications:comp.bonif;
        const displayDecote=isFrozen?pay.decote_rate:comp.decote;
        const displayTotal=isFrozen?pay.total_com:comp.totalCom;
        const hasDecote=displayDecote>0;

        // Filtrage explicite avec gestion du débordement du mois précédent
        const cutoff=isFrozen&&pay.paid_at?new Date(pay.paid_at):null;
        const prevM=month===1?12:month-1;
        const prevY=month===1?year-1:year;
        const prevCutoff=payments[p.id]&&payments[p.id][prevM]&&payments[p.id][prevM].paid_at
          ?new Date(payments[p.id][prevM].paid_at):null;
        const displayContracts=contracts.filter(function(c){
          if(c.conseiller_id!==p.id) return false;
          if(c.status==='ANNULE') return false;
          const dt=c.document_tracking||{};
          if(!dt.eligible_since) return false;
          const es=new Date(dt.eligible_since);
          if(es.getFullYear()===year&&es.getMonth()+1===month){
            if(cutoff&&es>cutoff) return false;
            return true;
          }
          if(es.getFullYear()===prevY&&es.getMonth()+1===prevM){
            if(prevCutoff&&es>prevCutoff) return true;
          }
          return false;
        });

        // Filtre recherche : indépendant du mois/année — cherche dans tous les contrats éligibles du conseiller
        const searchContracts=comSearch
          ? contracts.filter(function(c){
              if(c.conseiller_id!==p.id) return false;
              if(c.status==='ANNULE') return false;
              const dt2=c.document_tracking||{};
              if(!dt2.eligible_since) return false;
              const q=comSearch.toLowerCase();
              return c.client_name.toLowerCase().includes(q)||(c.contract_number||'').toLowerCase().includes(q);
            })
          : displayContracts;
        const filteredContracts=comSearch?searchContracts:displayContracts;

        // N'afficher que les conseillers avec au moins une ligne client
        if(filteredContracts.length===0) return null;

        return(
          <div key={p.id} className="card" style={{marginBottom:'16px',overflow:'hidden'}}>
            <div style={{padding:'14px 18px',borderBottom:'1px solid #f3f4f6',display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:'8px',background:isFrozen?'#f0fdf4':''}}>
              <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
                <span style={{fontWeight:600,fontSize:'15px'}}>{p.full_name}</span>
                {isFrozen&&<span className="badge" style={{background:'#d1fae5',color:'#065f46'}}>🔒 Gelé · {pay.bs_month}</span>}
              </div>
              <div style={{display:'flex',gap:'8px',alignItems:'center',flexWrap:'wrap'}}>
                {hasDecote&&<span className="badge" style={{background:'#fee2e2',color:'#991b1b'}}>⚠ Décote NC {displayDecote.toFixed?displayDecote.toFixed(1):displayDecote}%</span>}
                <span style={{fontSize:'13px',color:'#666'}}>Base : {feur(displayBase)}</span>
                <span style={{fontSize:'16px',fontWeight:700,color:'#1d4ed8'}}>= {feur(displayTotal)}</span>
              </div>
            </div>

            <div style={{overflowX:'auto'}}>              <table>
                <thead><tr>
                  <th style={{width:'32px'}}></th><th>Client</th><th>Type</th><th>Prime annuelle</th><th>Taux / Fixe</th><th>Commission</th><th>Mono</th><th>Éligible depuis</th>
                </tr></thead>
                <tbody>
                  {filteredContracts.length===0
                    ? <tr><td colSpan="7" style={{textAlign:'center',color:'#aaa',padding:'16px'}}>Aucun contrat éligible ce mois</td></tr>
                    : filteredContracts.map(function(c){
                      const g=GRILLE_2026[c.contract_type];
                      const com=calcBaseCommission(c);
                      const mt=c.mono_type||'';
                      return(
                        <tr key={c.id} style={{cursor:'pointer',background:checked[c.id]?'#f0fdf4':''}}>
                          <td onClick={function(e){e.stopPropagation();toggleCheck(c.id);}} style={{textAlign:'center',cursor:'pointer'}}>
                            <span style={{display:'inline-flex',alignItems:'center',justifyContent:'center',width:'18px',height:'18px',borderRadius:'4px',border:'1.5px solid '+(checked[c.id]?'#16a34a':'#d1d5db'),background:checked[c.id]?'#16a34a':'#fff',color:'#fff',fontSize:'11px',fontWeight:700,transition:'all 0.15s'}}>
                              {checked[c.id]?'✓':''}
                            </span>
                          </td>
                          <td style={{fontWeight:500}} onClick={function(){onSelect(c);}}>{c.client_name}</td>
                          <td onClick={function(){onSelect(c);}}><span className="badge" style={{background:'#f3f4f6',color:'#374151',fontSize:'10.5px'}}>{c.contract_type}</span></td>
                          <td onClick={function(){onSelect(c);}}>{feur0(c.annual_premium)}</td>
                          <td onClick={function(){onSelect(c);}} style={{color:'#555',fontSize:'12px'}}>{g?(g.fixed?g.rate+'€ fixe':parseFloat((g.rate*100).toFixed(2))+'%'):'—'}</td>
                          <td onClick={function(){onSelect(c);}} style={{fontWeight:600,color:'#1d4ed8'}}>{feur(com)}</td>
                          <td onClick={function(){onSelect(c);}}><span style={{fontSize:'12px',color:'#666'}}>{mt?MONO_OPTS.find(function(o){return o.value===mt;})?MONO_OPTS.find(function(o){return o.value===mt;}).label.split(' ')[0]:mt:'—'}</span></td>
                          <td onClick={function(){onSelect(c);}} style={{fontSize:'12px',color:'#888'}}>{c.document_tracking&&c.document_tracking.eligible_since?fdate(c.document_tracking.eligible_since):'—'}</td>
                        </tr>
                      );
                    })
                  }
                </tbody>
              </table>
            </div>

            {(displayBonif>0||comp.tauxNC>0)&&(
              <div style={{padding:'10px 18px',background:'#f8fafc',borderTop:'1px solid #e5e7eb',fontSize:'12.5px',color:'#555',display:'flex',gap:'16px',flexWrap:'wrap'}}>
                {displayBonif>0&&<span style={{color:'#166534'}}>Bonifications : {feur(displayBonif)}</span>}
                <span>Taux NC : {comp.tauxNC.toFixed(1)}%{isFrozen?' (gelé)':''}</span>
              </div>
            )}

            {/* Direction : paiement */}
            {canDir&&(
              <div style={{padding:'14px 18px',borderTop:'1px solid #f3f4f6',display:'flex',gap:'16px',alignItems:'center',flexWrap:'wrap',background:isFrozen?'#f0fdf4':''}}>
                <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                  <label style={{margin:0,fontSize:'12.5px',color:'#555'}}>Mois BS</label>
                  <input
                    value={pay.bs_month||bsLabel}
                    onChange={function(e){savePayment(p.id,'bs_month',e.target.value);}}
                    disabled={isFrozen}
                    style={{width:'130px',padding:'5px 9px',fontSize:'12.5px',background:isFrozen?'#f3f4f6':''}}
                  />
                </div>
                <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                  <label style={{margin:0,fontSize:'12.5px',color:'#555'}}>Payé</label>
                  <label className="toggle" style={{cursor:isFrozen?'default':'pointer'}}>
                    <input type="checkbox" checked={!!pay.paid} onChange={function(e){savePayment(p.id,'paid',e.target.checked);}} disabled={saving}/>
                    <span className="slider"></span>
                  </label>
                  {pay.paid&&<span style={{fontSize:'12px',color:'#059669',fontWeight:500}}>✓ Payé · {pay.bs_month||bsLabel}</span>}
                </div>
                {isFrozen&&!pay.paid&&<button onClick={function(){savePayment(p.id,'frozen',false);}} style={{fontSize:'11.5px',padding:'4px 10px',color:'#92400e',border:'1px solid #fde68a',background:'#fef9c3'}}>Dégeler</button>}
              </div>
            )}

            {/* Manager / collab : lecture seule */}
            {!canDir&&(
              <div style={{padding:'12px 18px',borderTop:'1px solid #f3f4f6',fontSize:'12.5px',color:'#555'}}>
                Statut : {pay.paid
                  ? <span style={{color:'#059669',fontWeight:600}}>✓ Payé{pay.bs_month?' — BS '+pay.bs_month:''}</span>
                  : <span style={{color:'#92400e'}}>En attente</span>
                }
              </div>
            )}
          </div>
        );
      })}
      </div>
    </div>
  );
}

/* ══ TABLEAU DE BORD ══ */
function TableauBord({contracts,profiles}){
  const now=new Date();
  const [year,setYear]=useState(now.getFullYear());
  const [month,setMonth]=useState(now.getMonth()+1);
  const [mode,setMode]=useState('mois');
  function inPeriod(c,y,m){
    if(!c.emission_date)return false;
    const d=new Date(c.emission_date);
    if(mode==='mois') return d.getFullYear()===y&&d.getMonth()+1===m;
    return d.getFullYear()===y;
  }
  const active=contracts.filter(function(c){return c.status!=='ANNULE';});
  const cur=active.filter(function(c){return inPeriod(c,year,month);});
  const prevY=mode==='mois'?(month===1?year-1:year):year-1;
  const prevM=mode==='mois'?(month===1?12:month-1):month;
  const prev=active.filter(function(c){return inPeriod(c,prevY,prevM);});
  const ca=sumCA(cur),caPrev=sumCA(prev);
  const evoCa=caPrev>0?((ca-caPrev)/caPrev*100):null;
  const nb=cur.length,nbPrev=prev.length;
  const evoNb=nbPrev>0?((nb-nbPrev)/nbPrev*100):null;
  const caByFamily=FAMILIES.map(function(f){
    const s=cur.filter(function(c){return f.types.includes(c.contract_type);}).reduce(function(a,c){return a+(c.annual_premium||0);},0);
    return {name:f.name,color:f.color,bg:f.bg,ca:s};
  }).filter(function(f){return f.ca>0;}).sort(function(a,b){return b.ca-a.ca;});
  const maxFam=caByFamily.length>0?caByFamily[0].ca:1;
  const monthlyData=MONTHS.map(function(ml,i){
    const c=active.filter(function(c){const d=new Date(c.emission_date);return d.getFullYear()===year&&d.getMonth()===i;});
    const p=active.filter(function(c){const d=new Date(c.emission_date);return d.getFullYear()===year-1&&d.getMonth()===i;});
    return {m:ml,cur:sumCA(c),prev:sumCA(p)};
  });
  const maxM=Math.max.apply(null,monthlyData.map(function(d){return Math.max(d.cur,d.prev);}));
  const maxMV=maxM>0?maxM:1;
  const conseillers=profiles.filter(function(p){return p.role==='conseiller'||p.role==='manager';});

    const mine=cur.filter(function(c){return c.conseiller_id===p.id;});
    const prevMine=prev.filter(function(c){return c.conseiller_id===p.id;});
    return {id:p.id,name:p.full_name,ca:sumCA(mine),nb:mine.length,caPrev:sumCA(prevMine),nbPrev:prevMine.length};
  }).sort(function(a,b){return b.ca-a.ca;});
  function Evo(props){
    const v=props.val;
    if(v===null)return React.createElement('span',{style:{color:'#aaa',fontSize:'11px'}},'—');
    return React.createElement('span',{style:{fontSize:'11.5px',fontWeight:600,color:v>=0?'#059669':'#dc2626'}},(v>=0?'▲ ':'▼ ')+Math.abs(v).toFixed(1)+'%');
  }

      <div style={{fontSize:'22px',fontWeight:600,marginBottom:'4px'}}>{props.value}</div>
      <Evo val={props.evo}/>
    </div>;
  }
  return(
    <div style={{padding:'28px 32px',maxWidth:'960px'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'22px',flexWrap:'wrap',gap:'12px'}}>
        <div><div style={{fontSize:'22px',fontWeight:600,marginBottom:'2px'}}>Tableau de bord</div><div style={{fontSize:'13px',color:'#666'}}>{mode==='mois'?MONTHS[month-1]+' '+year:'Année '+year}</div></div>
        <div style={{display:'flex',gap:'8px',alignItems:'center',flexWrap:'wrap'}}>
          <div style={{display:'flex',border:'1px solid #e5e7eb',borderRadius:'8px',overflow:'hidden'}}>
            <button onClick={function(){setMode('mois');}} style={{padding:'6px 14px',fontSize:'12.5px',border:'none',borderRadius:0,background:mode==='mois'?'#1d4ed8':'#fff',color:mode==='mois'?'#fff':'#555'}}>Mois</button>
            <button onClick={function(){setMode('annee');}} style={{padding:'6px 14px',fontSize:'12.5px',border:'none',borderLeft:'1px solid #e5e7eb',borderRadius:0,background:mode==='annee'?'#1d4ed8':'#fff',color:mode==='annee'?'#fff':'#555'}}>Année</button>
          </div>
          {mode==='mois'&&<select value={month} onChange={function(e){setMonth(parseInt(e.target.value));}} style={{width:'auto',padding:'6px 10px'}}>{MONTHS.map(function(ml,i){return <option key={i} value={i+1}>{ml}</option>;})}</select>}
          <select value={year} onChange={function(e){setYear(parseInt(e.target.value));}} style={{width:'auto',padding:'6px 10px'}}>{[2021,2022,2023,2024,2025,2026].map(function(y){return <option key={y} value={y}>{y}</option>;})}</select>
        </div>

      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'16px',marginBottom:'16px'}}>
        <div style={{background:'#fff',border:'1px solid #e5e7eb',borderRadius:'10px',padding:'18px'}}>
          <div style={{fontSize:'13px',fontWeight:600,marginBottom:'14px'}}>CA par famille</div>
          {caByFamily.length===0?<div style={{color:'#aaa',fontSize:'13px',textAlign:'center',padding:'20px 0'}}>Aucune donnée</div>:caByFamily.map(function(f){return(

        }
      </div>
    </div>
  );
}

function FormContrat({sb,profile,profiles,onSaved}){

  const [f,setF]=useState(mk());
  const [saving,setSaving]=useState(false);
  const [err,setErr]=useState('');
  function u(k,v){setF(function(p){return Object.assign({},p,{[k]:v});});}
  const isDir=['direction','manager'].includes(profile.role);
  const fam=getFamily(f.contract_type);
  async function save(){
    if(!f.client_name.trim()){setErr('Le nom du client est obligatoire.');return;}
    if(!f.contract_number.trim()){setErr('Le numéro de contrat est obligatoire.');return;}
    if(!f.emission_date){setErr("La date d'émission est obligatoire.");return;}
    if(!f.effect_date){setErr("La date d'effet est obligatoire.");return;}
    if(!f.contract_type){setErr('Le type de contrat est obligatoire.');return;}
    if(!f.provenance){setErr('La provenance est obligatoire.');return;}
    if(!f.code_portefeuille){setErr('Le code portefeuille est obligatoire.');return;}
    if(!f.annual_premium||parseFloat(f.annual_premium)<=0){setErr('La prime annuelle est obligatoire.');return;}
    setSaving(true);setErr('');
    const g=GRILLE_2026[f.contract_type];
    const autocom=g?(g.fixed?g.rate:Math.round((parseFloat(f.annual_premium)||0)*g.rate*100)/100):0;
    const res=await sb.from('contracts').insert({conseiller_id:f.conseiller_id||profile.id,client_name:toUpper(f.client_name.trim()),contract_number:f.contract_number.trim(),emission_date:f.emission_date,effect_date:f.effect_date,contract_type:f.contract_type,provenance:f.provenance,annual_premium:parseFloat(f.annual_premium)||0,commission:autocom,comments:f.comments,code_portefeuille:f.code_portefeuille||null});
    if(res.error){setErr('Erreur : '+res.error.message);setSaving(false);return;}
    onSaved();
  }

    <div style={{padding:'36px 40px',maxWidth:'720px'}}>

      <div className="card" style={{padding:'28px'}}>
        {isDir&&<div className="fg"><label>Conseiller *</label><select value={f.conseiller_id} onChange={function(e){u('conseiller_id',e.target.value);}}>{profiles.map(function(p){return <option key={p.id} value={p.id}>{p.full_name} ({RL[p.role]})</option>;})}</select></div>}
        <div className="fg2">
          <div className="fg"><label>Nom prénom / Raison sociale *</label><input value={f.client_name} onChange={function(e){u('client_name',e.target.value);}} onBlur={function(e){u('client_name',toUpper(e.target.value));}} placeholder="DUPONT JEAN"/></div>
          <div className="fg">
            <label style={{display:'flex',alignItems:'center',gap:'6px'}}>N° contrat *
              <div className="tip-wrap"><span style={{display:'inline-flex',alignItems:'center',justifyContent:'center',width:'15px',height:'15px',borderRadius:'50%',background:'#e5e7eb',color:'#555',fontSize:'10px',fontWeight:700,cursor:'help',flexShrink:0}}>?</span><span className="tip">Sans n° de contrat, indiquez la nature : "Courtage", "Banque", etc.</span></div>
            </label>
            <input value={f.contract_number} onChange={function(e){u('contract_number',e.target.value);}} placeholder="N° ou ex: Courtage, Banque…"/>
          </div>
        </div>
        <div className="fg2">
          <div className="fg"><label>Date d'émission *</label><input type="date" value={f.emission_date} onChange={function(e){u('emission_date',e.target.value);}}/></div>
          <div className="fg"><label>Date d'effet *</label><input type="date" value={f.effect_date} onChange={function(e){u('effect_date',e.target.value);}}/></div>
        </div>
        <div className="fg2">
          <div className="fg">
            <label>Type de contrat *</label>
            <select value={f.contract_type} onChange={function(e){u('contract_type',e.target.value);}}>
              <option value="" disabled>Ex : Auto/Moto, MRH, Santé…</option>
              {FAMILIES.map(function(fam){return <optgroup key={fam.name} label={fam.name}>{fam.types.map(function(t){return <option key={t} value={t}>{t}</option>;})}</optgroup>;})}

        <div style={{display:'flex',gap:'10px',justifyContent:'flex-end'}}>

        </div>
      </div>
    </div>
  );

/* ══ MULTI SELECT ══ */
function MultiSelect({label,options,value,onChange,width}){
  const [open,setOpen]=useState(false);
  const ref=React.useRef(null);
  useEffect(function(){
    function handle(e){if(ref.current&&!ref.current.contains(e.target))setOpen(false);}
    document.addEventListener('mousedown',handle);
    return function(){document.removeEventListener('mousedown',handle);};
  },[]);
  function toggle(v){
    if(value.includes(v)) onChange(value.filter(function(x){return x!==v;}));
    else onChange(value.concat(v));
  }
  const displayLabel=value.length===0?label:value.length===1?(options.find(function(o){return o.value===value[0];})||{label:value[0]}).label:value.length+' sélectionnés';
  return(
    <div ref={ref} style={{position:'relative',flexShrink:0,width:width||'auto',minWidth:'120px'}}>
      <button onClick={function(){setOpen(!open);}} style={{width:'100%',padding:'9px 12px',border:'1px solid '+(value.length>0?'#3b82f6':'#e5e7eb'),borderRadius:'8px',background:value.length>0?'#eff6ff':'#fff',color:value.length>0?'#1d4ed8':'#111',fontSize:'13px',textAlign:'left',display:'flex',justifyContent:'space-between',alignItems:'center',gap:'4px',cursor:'pointer'}}>
        <span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1}}>{displayLabel}</span>
        <span style={{fontSize:'10px',color:'#999',flexShrink:0}}>{open?'▲':'▼'}</span>
      </button>
      {open&&(
        <div style={{position:'absolute',top:'calc(100% + 4px)',left:0,zIndex:50,background:'#fff',border:'1px solid #e5e7eb',borderRadius:'8px',boxShadow:'0 4px 16px rgba(0,0,0,0.12)',minWidth:'100%',maxHeight:'220px',overflowY:'auto'}}>
          {value.length>0&&<div onClick={function(){onChange([]);}} style={{padding:'7px 12px',fontSize:'12px',color:'#dc2626',cursor:'pointer',borderBottom:'1px solid #f3f4f6'}}>✕ Tout effacer</div>}
          {options.map(function(o){
            const sel=value.includes(o.value);
            return(
              <div key={o.value} onClick={function(){toggle(o.value);}} style={{padding:'7px 12px',fontSize:'13px',cursor:'pointer',background:sel?'#eff6ff':'#fff',color:sel?'#1d4ed8':'#111',display:'flex',alignItems:'center',gap:'8px'}}>
                <span style={{width:'14px',height:'14px',border:'1.5px solid '+(sel?'#1d4ed8':'#d1d5db'),borderRadius:'3px',background:sel?'#1d4ed8':'#fff',display:'inline-flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:'10px',color:'#fff'}}>{sel?'✓':''}</span>
                {o.label}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}


function SuiviDossiers({contracts,profile,profiles,reads,lastMsgMap,sort,setSort,fCons,setFCons,fYear,setFYear,fMonth,setFMonth,fType,setFType,fStat,setFStat,fDoss,setFDoss,fPay,setFPay,fDup,setFDup,search,setSearch,onSelect,onNew}){
  function sortBy(col){setSort(function(s){return s.col===col?{col:col,asc:!s.asc}:{col:col,asc:true};});}

  // Détecter les doublons AVANT le filtre
  const normNum=function(n){return n?String(n).replace(/^0+|0+$/g,''):''};
  const dupNums=new Set();
  const seenNums={};
  contracts.forEach(function(c){
    if(!c.contract_number) return;
    const norm=normNum(c.contract_number);
    if(!norm) return;
    if(seenNums[norm]) dupNums.add(norm);
    else seenNums[norm]=true;
  });

  // Filtrage facetté : options disponibles selon les autres filtres actifs
  function applyFilters(cs,excl){
    return cs.filter(function(c){
      if(excl!=='cons'&&fCons.length>0&&!fCons.includes(c.conseiller_id))return false;
      if(excl!=='year'&&fYear.length>0&&(!c.emission_date||!fYear.includes(String(new Date(c.emission_date).getFullYear()))))return false;
      if(excl!=='month'&&fMonth.length>0&&(!c.emission_date||!fMonth.includes(String(new Date(c.emission_date).getMonth()+1))))return false;
      if(excl!=='dup'&&fDup&&(!c.contract_number||!dupNums.has(normNum(c.contract_number))))return false;
      if(excl!=='type'&&fType.length>0&&!fType.includes(c.contract_type))return false;
      if(excl!=='stat'&&fStat.length>0&&!fStat.includes(c.status))return false;
      if(excl!=='doss'&&fDoss.length>0){const ds=docStatus(c.document_tracking);if(!fDoss.includes(ds.l))return false;}
      if(excl!=='pay'&&fPay.length>0&&!fPay.includes((c.document_tracking&&c.document_tracking.payment_status)||'non_paye'))return false;
      if(search&&!c.client_name.toLowerCase().includes(search.toLowerCase())&&!(c.contract_number||'').includes(search))return false;
      return true;
    });
  }

  // Options dynamiques par filtre
  const availYears=[...new Set(applyFilters(contracts,'year').map(function(c){return c.emission_date?String(new Date(c.emission_date).getFullYear()):null;}).filter(Boolean))].sort();
  const availMonths=[...new Set(applyFilters(contracts,'month').map(function(c){return c.emission_date?String(new Date(c.emission_date).getMonth()+1):null;}).filter(Boolean))].sort(function(a,b){return parseInt(a)-parseInt(b);});
  const availCons=[...new Set(applyFilters(contracts,'cons').map(function(c){return c.conseiller_id;}).filter(Boolean))];
  const availTypes=[...new Set(applyFilters(contracts,'type').map(function(c){return c.contract_type;}).filter(Boolean))].sort();
  const availStats=[...new Set(applyFilters(contracts,'stat').map(function(c){return c.status;}).filter(Boolean))].sort();
  const availDoss=[...new Set(applyFilters(contracts,'doss').map(function(c){return docStatus(c.document_tracking).l;}).filter(Boolean))].sort();
  const availPay=[...new Set(applyFilters(contracts,'pay').map(function(c){return (c.document_tracking&&c.document_tracking.payment_status)||'non_paye';}).filter(Boolean))].sort();

  const list=contracts.filter(function(c){
    if(fCons.length>0&&!fCons.includes(c.conseiller_id))return false;
    if(fYear.length>0&&(!c.emission_date||!fYear.includes(String(new Date(c.emission_date).getFullYear()))))return false;
    if(fMonth.length>0&&(!c.emission_date||!fMonth.includes(String(new Date(c.emission_date).getMonth()+1))))return false;
    if(fDup&&(!c.contract_number||!dupNums.has(normNum(c.contract_number))))return false;
    if(fType.length>0&&!fType.includes(c.contract_type))return false;
    if(fStat.length>0&&!fStat.includes(c.status))return false;
    if(fDoss.length>0){const ds=docStatus(c.document_tracking);if(!fDoss.includes(ds.l))return false;}
    if(fPay.length>0&&!fPay.includes((c.document_tracking&&c.document_tracking.payment_status)||'non_paye'))return false;
    if(search&&!c.client_name.toLowerCase().includes(search.toLowerCase())&&!(c.contract_number||'').includes(search))return false;
    return true;
  }).sort(function(a,b){
    let va=a[sort.col],vb=b[sort.col];
    if(sort.col==='dossier'){va=docStatus(a.document_tracking).l;vb=docStatus(b.document_tracking).l;}
    if(sort.col==='paiement'){va=(a.document_tracking&&a.document_tracking.payment_status)||'';vb=(b.document_tracking&&b.document_tracking.payment_status)||'';}
    if(sort.col==='conseiller'){va=a.conseiller&&a.conseiller.full_name?a.conseiller.full_name:'';vb=b.conseiller&&b.conseiller.full_name?b.conseiller.full_name:'';}
    if(va<vb)return sort.asc?-1:1;
    if(va>vb)return sort.asc?1:-1;
    return 0;
  });

  function SH(props){const on=sort.col===props.col;return <th onClick={function(){sortBy(props.col);}} style={{background:on?'#eff6ff':''}}>{props.children}{on?(sort.asc?' ↑':' ↓'):' ↕'}</th>;}
  return(
    <div style={{padding:'28px 32px'}}>
      <div style={{marginBottom:'18px',display:'flex',alignItems:'center',justifyContent:'space-between',gap:'12px',flexWrap:'wrap'}}>
        <div><div style={{fontSize:'22px',fontWeight:600,marginBottom:'4px'}}>{profile.role==='conseiller'?'Mes dossiers':'Suivi des dossiers'}</div><div style={{fontSize:'13px',color:'#666'}}>{list.length} contrat{list.length!==1?'s':''}</div></div>
        <button className="bp" onClick={onNew}>+ Nouveau contrat</button>
      </div>
      <div style={{display:'flex',gap:'8px',marginBottom:'14px',flexWrap:'wrap',alignItems:'center'}}>
        <input value={search} onChange={function(e){setSearch(e.target.value);}} placeholder="Client ou n° contrat…" style={{maxWidth:'180px'}}/>
        <MultiSelect label="Toutes années" width="130px" value={fYear} onChange={setFYear} options={availYears.map(function(y){return {value:y,label:y};})}/>
        <MultiSelect label="Tous mois" width="120px" value={fMonth} onChange={setFMonth} options={availMonths.map(function(m){return {value:m,label:MONTHS[parseInt(m)-1]};})}/>
        <MultiSelect label="Tous conseillers" width="150px" value={fCons} onChange={setFCons} options={availCons.map(function(id){const p=profiles.find(function(p){return p.id===id;});return {value:id,label:p?p.full_name:id};})}/>
        <MultiSelect label="Tous types" width="130px" value={fType} onChange={setFType} options={availTypes.map(function(t){return {value:t,label:t};})}/>
        <MultiSelect label="Tous dossiers" width="135px" value={fDoss} onChange={setFDoss} options={availDoss.map(function(d){return {value:d,label:d};})}/>
        <MultiSelect label="Tous paiements" width="140px" value={fPay} onChange={setFPay} options={availPay.map(function(v){const o=PAY_OPTS.find(function(p){return p.value===v;});return {value:v,label:o?o.label:v};})}/>
        <MultiSelect label="Tous statuts" width="125px" value={fStat} onChange={setFStat} options={availStats.map(function(s){return {value:s,label:s};})}/>
        <div style={{marginLeft:'auto',display:'flex',gap:'8px'}}>
          {(fCons.length||fType.length||fStat.length||fDoss.length||fPay.length||fYear.length||fMonth.length||fDup||search)
            ?<button onClick={function(){setFCons([]);setFType([]);setFStat([]);setFDoss([]);setFPay([]);setFYear([]);setFMonth([]);setFDup(false);setSearch('');if(profile){['fCons','fType','fStat','fDoss','fPay','fYear','fMonth','fDup'].forEach(function(k){try{localStorage.removeItem('crm_'+profile.id+'_'+k);}catch(e){}});}}} style={{fontSize:'12px',padding:'6px 12px',borderRadius:'8px',border:'1px solid #e5e7eb',background:'#fff',color:'#555'}}>✕ Supprimer les filtres</button>
            :null}
          <button onClick={function(){setFDup(!fDup);}} style={{fontSize:'12px',padding:'6px 12px',background:fDup?'#fee2e2':'#fff',color:fDup?'#991b1b':'#555',border:fDup?'1px solid #fecaca':'1px solid #e5e7eb',fontWeight:fDup?600:400,borderRadius:'8px'}}>⚠ Doublons{fDup?' ✓':''}</button>
        </div>
      </div>
      <div className="card">
        {list.length===0?<div style={{padding:'48px',textAlign:'center',color:'#999',fontSize:'14px'}}>Aucun contrat</div>
        :<div style={{overflowX:'auto',overflowY:'auto',maxHeight:'calc(100vh - 260px)'}}><table><thead><tr>
          <SH col="conseiller">Conseiller</SH><SH col="client_name">Client</SH><SH col="contract_number">N° contrat</SH>
          <SH col="emission_date">Date émission</SH><SH col="effect_date">Date effet</SH><th>Type</th>
          <SH col="annual_premium">Prime annuelle</SH><SH col="dossier">Dossier</SH><SH col="paiement">Paiement cotisation</SH><SH col="status">Statut</SH>
        </tr></thead><tbody>
          {list.map(function(c){
            const ds=docStatus(c.document_tracking);
            const ps=payOpt(c.document_tracking);
            const hasProb=c.document_tracking&&c.document_tracking.has_problem;
            const annReq=c.annulation_requested;
            const annOk=c.status==='ANNULE';
            const fam=getFamily(c.contract_type);
            const lastMsg=lastMsgMap[c.id];
            const lastRead=reads[c.id];
            const hasUnread=lastMsg&&(!lastRead||new Date(lastMsg)>new Date(lastRead));
            const rowBg=annOk?'#e2e8f0':annReq?'#cbd5e1':c.status==='PAYE'?'#f0fdf4':hasProb?'#fff5f5':'';
            const isDup=c.contract_number&&dupNums.has(normNum(c.contract_number));
            const textColor=annOk?'#334155':annReq?'#334155':'#333';
            const mutedColor=annOk?'#64748b':annReq?'#64748b':c.status==='PAYE'?'#166534':'#666';
            return <tr key={c.id} onClick={function(){onSelect(c);}} style={{cursor:'pointer',background:rowBg,color:textColor}}>
              <td style={{color:mutedColor,fontSize:'12.5px'}}>{c.conseiller&&c.conseiller.full_name?c.conseiller.full_name:'—'}</td>
              <td style={{fontWeight:500,color:textColor}}><div style={{display:'flex',alignItems:'center',gap:'6px'}}>{c.client_name}{hasUnread&&<span className="env-anim" title="Nouveau message" style={{fontSize:'13px',color:'#f59e0b'}}>✉</span>}</div></td>
              <td style={{color:mutedColor,fontFamily:'monospace',fontSize:'11.5px'}}>
                {isDup
                  ? <span style={{background:'#fef9c3',color:'#92400e',border:'1px solid #fde68a',borderRadius:'4px',padding:'1px 5px',fontWeight:600}} title="N° en doublon">⚠ {c.contract_number}</span>
                  : c.contract_number
                }
              </td>
              <td style={{color:mutedColor,whiteSpace:'nowrap'}}>{fdate(c.emission_date)}</td>
              <td style={{color:mutedColor,whiteSpace:'nowrap'}}>{fdate(c.effect_date)}</td>
              <td>{fam?<span className="badge" style={{background:annOk||annReq?'#4b5563':fam.bg,color:annOk||annReq?'#d1d5db':fam.color}}>{c.contract_type}</span>:<span className="badge" style={{background:'#f3f4f6',color:'#374151'}}>{c.contract_type}</span>}</td>
              <td style={{fontWeight:500,whiteSpace:'nowrap',color:textColor}}>{feur0(c.annual_premium)}</td>
              <td><div style={{display:'flex',alignItems:'center',gap:'4px',flexWrap:'wrap'}}>
                {annOk?<span className="badge" style={{background:'#94a3b8',color:'#fff'}}>Annulé</span>:<span className="badge" style={{background:ds.bg,color:ds.tx}}>{ds.l}</span>}
                {annReq&&!annOk&&<span className="badge" style={{background:'#94a3b8',color:'#fff'}}>Annulation dem.</span>}
                {hasProb&&<span className="badge" style={{background:'#fee2e2',color:'#991b1b'}}>⚠ Problème</span>}
              </div></td>
              <td><span className="badge" style={{background:ps.bg,color:ps.tx}}>{ps.label}</span></td>
              <td><span className="badge" style={{background:annOk?'#94a3b8':c.status==='ENCOURS'?'#dbeafe':c.status==='PAYE'?'#d1fae5':'#f3f4f6',color:annOk?'#fff':c.status==='ENCOURS'?'#1e40af':c.status==='PAYE'?'#065f46':'#374151'}}>{c.status}</span></td>
            </tr>;
          })}
        </tbody></table></div>}
      </div>
    </div>
  );
}

/* ══ PANNEAU DÉTAIL ══ */
function DetailPanel({contract,profile,profiles,sb,onClose,onRefresh}){
  const [dt,setDt]=useState(contract.document_tracking||{});
  const [monoType,setMonoType]=useState(contract.mono_type||'');
  const [annReq,setAnnReq]=useState(contract.annulation_requested||false);
  const [isAnnule,setIsAnnule]=useState(contract.status==='ANNULE');
  const [codePortefeuille,setCodePortefeuille]=useState(contract.code_portefeuille||'');
  const isPaye=contract.status==='PAYE';
  const [payInfo,setPayInfo]=useState(null);

  useEffect(function(){
    if(!isPaye) return;
    sb.from('commission_payments').select('paid_at,bs_month').eq('frozen',true)
      .contains('frozen_contract_ids',[contract.id]).limit(1)
      .then(function(res){
        if(res.data&&res.data.length>0) setPayInfo(res.data[0]);
      });
  },[isPaye,contract.id,sb]);
  const [editing,setEditing]=useState(false);
  const [editF,setEditF]=useState({client_name:contract.client_name,emission_date:contract.emission_date,effect_date:contract.effect_date,provenance:contract.provenance||'',annual_premium:contract.annual_premium||0,commission:calcBaseCommission(contract),conseiller_id:contract.conseiller_id,contract_type:contract.contract_type,contract_number:contract.contract_number,code_portefeuille:contract.code_portefeuille||''});
  const [saveErr,setSaveErr]=useState('');
  const [messages,setMessages]=useState([]);
  const [newMsg,setNewMsg]=useState('');
  const [saving,setSaving]=useState(false);
  const canDir=profile.role==='direction';
  const isLocked=isPaye; // Tout gelé quand PAYE
  const canPieces=!isLocked&&['manager','direction'].includes(profile.role);
  const canDirEdit=!isLocked&&canDir; // Direction ne peut modifier que si non gelé
  const isCollab=profile.role==='conseiller';
  const loadMsgs=useCallback(async function(){const res=await sb.from('contract_messages').select('*').eq('contract_id',contract.id).order('created_at',{ascending:true});setMessages(res.data||[]);},[sb,contract.id]);
  useEffect(function(){loadMsgs();},[loadMsgs]);
  async function updDt(u){
    setSaving(true);
    const newDt=Object.assign({},dt,u);
    const wasEligible=isEligibleForCommission({status:contract.status,document_tracking:dt});
    const fakeC={status:contract.status,document_tracking:newDt};
    const nowEligible=isEligibleForCommission(fakeC);
    const payload=Object.assign({},u,{updated_at:new Date().toISOString()});
    // Ne mettre eligible_since que si pas encore défini et vient de devenir éligible
    if(nowEligible&&!wasEligible&&!dt.eligible_since){
      const ts=new Date().toISOString();
      newDt.eligible_since=ts;
      payload.eligible_since=ts;
    }
    // Effacer eligible_since seulement si on repasse non éligible
    if(!nowEligible&&wasEligible){
      newDt.eligible_since=null;
      payload.eligible_since=null;
    }
    await sb.from('document_tracking').update(payload).eq('contract_id',contract.id);
    setDt(newDt);onRefresh();setSaving(false);
  }
  async function saveEdit(){
    setSaving(true);setSaveErr('');
    const rawCom=String(editF.commission).trim();
    const newCom=rawCom===''?0:(isNaN(parseFloat(rawCom))?0:parseFloat(rawCom));
    const res=await sb.from('contracts').update({
      client_name:toUpper(editF.client_name),
      emission_date:editF.emission_date,
      effect_date:editF.effect_date,
      provenance:editF.provenance,
      annual_premium:parseFloat(editF.annual_premium)||0,
      commission:newCom,
      manual_commission:newCom,
      conseiller_id:editF.conseiller_id,
      contract_type:editF.contract_type,
      contract_number:editF.contract_number,
      code_portefeuille:editF.code_portefeuille||null,
    }).eq('id',contract.id);
    if(res.error){setSaveErr('Erreur : '+res.error.message);setSaving(false);return;}
    setEditing(false);onRefresh();setSaving(false);
  }
  async function saveMonoType(val){
    setMonoType(val);
    // Si commission manuelle existante → on la garde, on recalcule seulement si pas de manuel
    const hasManual=contract.manual_commission!==null&&contract.manual_commission!==undefined;
    if(hasManual){
      // Juste mettre à jour le type mono, pas la commission
      await sb.from('contracts').update({mono_type:val||null}).eq('id',contract.id);
    } else {
      const fakeC=Object.assign({},contract,{mono_type:val||null,manual_commission:null});
      const newCom=calcBaseCommission(fakeC);
      await sb.from('contracts').update({mono_type:val||null,commission:newCom}).eq('id',contract.id);
    }
    onRefresh();
  }
  async function toggleAnnReq(){const v=!annReq;setAnnReq(v);await sb.from('contracts').update({annulation_requested:v}).eq('id',contract.id);onRefresh();}
  async function toggleAnnule(v){
    setIsAnnule(v);
    await sb.from('contracts').update({status:v?'ANNULE':'ENCOURS'}).eq('id',contract.id);
    if(v){
      // Annulé : effacer eligible_since + commission
      await sb.from('document_tracking').update({eligible_since:null}).eq('contract_id',contract.id);
      await sb.from('contracts').update({commission:0,manual_commission:null}).eq('id',contract.id);
      setDt(function(p){return Object.assign({},p,{eligible_since:null});});
    }
    onRefresh();
  }
  async function sendMsg(){if(!newMsg.trim())return;setSaving(true);await sb.from('contract_messages').insert({contract_id:contract.id,author_id:profile.id,author_name:profile.full_name,author_role:profile.role,message:newMsg.trim(),resolved_status:'pending'});setNewMsg('');await loadMsgs();setSaving(false);}
  async function setMsgStatus(id,status){await sb.from('contract_messages').update({resolved_status:status,is_resolved:status==='resolved'}).eq('id',id);await loadMsgs();}
  function TG(props){return <div className="cr"><span style={{fontSize:'13.5px',color:props.disabled?'#aaa':'#222'}}>{props.label}</span><label className="toggle"><input type="checkbox" checked={!!dt[props.field]} disabled={props.disabled||saving} onChange={function(e){updDt({[props.field]:e.target.checked});}}/><span className="slider" style={props.blackChecked&&dt[props.field]?{background:'#111'}:{}}></span></label></div>;}
  function IR(props){return <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'9px 0',borderBottom:'1px solid #f3f4f6',fontSize:'13.5px'}}><span style={{color:'#666'}}>{props.label}</span><span style={{fontWeight:500}}>{props.value}</span></div>;}
  function eu(k,v){setEditF(function(p){return Object.assign({},p,{[k]:v});});}
  const fam=getFamily(contract.contract_type);
  const headerBg=isAnnule?'#e2e8f0':annReq?'#cbd5e1':dt.has_problem?'rgba(185,28,28,0.82)':isPaye?'#f0fdf4':'#fff';
  const headerTx=dt.has_problem?'#f3f4f6':isAnnule?'#334155':annReq?'#334155':isPaye?'#065f46':'#111';
  return(
    <div className="overlay" onClick={function(e){if(e.target===e.currentTarget)onClose();}}>
      <div className="panel">
        <div style={{padding:'16px 20px',borderBottom:'1px solid #e5e7eb',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0,background:headerBg,transition:'background 0.2s'}}>
          <div>
            <div style={{fontSize:'15px',fontWeight:600,color:headerTx,display:'flex',alignItems:'center',gap:'8px'}}>
                {contract.client_name}
                {isPaye&&<span style={{fontSize:'11.5px',fontWeight:600,color:'#065f46',background:'#bbf7d0',padding:'2px 8px',borderRadius:'100px'}}>
                  ✓ Payé{payInfo&&payInfo.bs_month?' · '+payInfo.bs_month:''}
                </span>}
              </div>
            <div style={{display:'flex',alignItems:'center',gap:'6px',marginTop:'3px',flexWrap:'wrap'}}>
              <span style={{fontSize:'12px',color:isAnnule||annReq?'#64748b':'#999'}}>{contract.contract_number}</span>
              {fam&&<span className="badge" style={{background:isAnnule||annReq?'#94a3b8':fam.bg,color:isAnnule||annReq?'#fff':fam.color,fontSize:'10.5px'}}>{contract.contract_type}</span>}
              {isAnnule&&<span className="badge" style={{background:'#94a3b8',color:'#fff',fontSize:'10.5px'}}>ANNULÉ</span>}
            </div>
          </div>
          <div style={{display:'flex',gap:'6px',alignItems:'center'}}>
            {canDirEdit&&!editing&&<button onClick={function(){
              setEditF({client_name:contract.client_name,emission_date:contract.emission_date,effect_date:contract.effect_date,provenance:contract.provenance||'',annual_premium:contract.annual_premium||0,commission:calcBaseCommission(contract),conseiller_id:contract.conseiller_id,contract_type:contract.contract_type,contract_number:contract.contract_number,code_portefeuille:contract.code_portefeuille||''});
              setEditing(true);
            }} style={{fontSize:'12px',padding:'5px 10px'}}>✏️ Modifier</button>}
            <button onClick={onClose} style={{padding:'6px 10px',fontSize:'13px'}}>✕</button>
          </div>
        </div>
        <div style={{flex:1,overflowY:'auto',padding:'20px'}}>
          {isLocked&&(
            <div style={{background:'#f0fdf4',border:'1px solid #bbf7d0',borderRadius:'8px',padding:'10px 14px',marginBottom:'16px',display:'flex',alignItems:'center',gap:'8px',fontSize:'13px',color:'#065f46'}}>
              🔒 Dossier verrouillé — commission validée {payInfo&&payInfo.bs_month?'· BS '+payInfo.bs_month:''}. {canDir?'Cliquez "Déverrouiller" pour modifier.':'Modification impossible.'}
            </div>
          )}
          <div style={{marginBottom:'20px'}}>
            <div className="sec">Informations</div>
            {editing?(
              <div className="card" style={{padding:'16px'}}>
                <div className="fg"><label>Conseiller</label><select value={editF.conseiller_id} onChange={function(e){eu('conseiller_id',e.target.value);}}>{profiles.map(function(p){return <option key={p.id} value={p.id}>{p.full_name}</option>;})}</select></div>
                <div className="fg"><label>Nom / Raison sociale</label><input value={editF.client_name} onChange={function(e){eu('client_name',e.target.value);}} onBlur={function(e){eu('client_name',toUpper(e.target.value));}}/></div>
                <div className="fg"><label>N° contrat</label><input value={editF.contract_number} onChange={function(e){eu('contract_number',e.target.value);}}/></div>
                <div className="fg2">
                  <div className="fg"><label>Date émission</label><input type="date" value={editF.emission_date} onChange={function(e){eu('emission_date',e.target.value);}}/></div>
                  <div className="fg"><label>Date d'effet</label><input type="date" value={editF.effect_date} onChange={function(e){eu('effect_date',e.target.value);}}/></div>
                </div>
                <div className="fg"><label>Type de contrat</label><select value={editF.contract_type} onChange={function(e){eu('contract_type',e.target.value);}}>{FAMILIES.map(function(f){return <optgroup key={f.name} label={f.name}>{f.types.map(function(t){return <option key={t} value={t}>{t}</option>;})}</optgroup>;})}</select></div>
                <div className="fg"><label>Provenance</label><select value={editF.provenance} onChange={function(e){eu('provenance',e.target.value);}}>{PROVS.map(function(p){return <option key={p} value={p}>{p}</option>;})}</select></div>
                <div className="fg"><label>Code portefeuille</label><select value={editF.code_portefeuille} onChange={function(e){eu('code_portefeuille',e.target.value);}}><option value="">— Sélectionner —</option><option value="6025344">6025344 · Le Cannet</option><option value="6251044">6251044 · St Maximin</option><option value="6252044">6252044 · Lyon</option></select></div>
                <div className="fg2">
                  <div className="fg"><label>Prime annuelle (€)</label><input type="number" value={editF.annual_premium} onChange={function(e){eu('annual_premium',e.target.value);}}/></div>
                  <div className="fg"><label>Commission (€)</label><input type="number" value={editF.commission} onChange={function(e){eu('commission',e.target.value);}}/></div>
                </div>
                <div style={{display:'flex',gap:'8px',justifyContent:'flex-end'}}>
                  {saveErr&&<div style={{color:'#b91c1c',fontSize:'12px',alignSelf:'center'}}>{saveErr}</div>}
                  <button onClick={function(){setEditing(false);setSaveErr('');setEditF({client_name:contract.client_name,emission_date:contract.emission_date,effect_date:contract.effect_date,provenance:contract.provenance||'',annual_premium:contract.annual_premium||0,commission:calcBaseCommission(contract),conseiller_id:contract.conseiller_id,contract_type:contract.contract_type,contract_number:contract.contract_number,code_portefeuille:contract.code_portefeuille||''});}}>Annuler</button>
                  <button className="bp" onClick={saveEdit} disabled={saving}>Enregistrer</button>
                </div>
              </div>
            ):(
              <div className="card" style={{padding:'0 16px'}}>
                <IR label="Conseiller" value={contract.conseiller&&contract.conseiller.full_name?contract.conseiller.full_name:'—'}/>
                <IR label="N° contrat" value={React.createElement('span',{style:{display:'flex',alignItems:'center',gap:'6px'}},contract.contract_number||'—',contract.contract_number&&React.createElement(CopyBtn,{text:contract.contract_number}))}/>
                <IR label="Date émission" value={fdate(contract.emission_date)}/>
                <IR label="Date d'effet" value={fdate(contract.effect_date)}/>
                <IR label="Provenance" value={contract.provenance||'—'}/>
                <IR label="Prime annuelle" value={feur0(contract.annual_premium)}/>
                {!isCollab&&<IR label="Commission calculée" value={feur(calcBaseCommission(contract))}/>}
                {contract.comments&&<IR label="Commentaire" value={contract.comments}/>}
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'9px 0',fontSize:'13.5px'}}>
                  <span style={{color:'#666'}}>Code portefeuille</span>
                  {canDir
                  ? <span style={{fontWeight:500}}>{codePortefeuille?({'6025344':'6025344 · Le Cannet','6251044':'6251044 · St Maximin','6252044':'6252044 · Lyon'}[codePortefeuille]||codePortefeuille):'—'}</span>
                  : <span style={{fontWeight:500}}>{contract.code_portefeuille||'—'}</span>
                  }
                </div>
              </div>
            )}
          </div>
          <div style={{marginBottom:'20px'}}>
            <div className="sec">Suivi de dossier {!canPieces&&'· lecture seule'}</div>
            <div className="card" style={{padding:'0 16px'}}>
              <TG label="N° de contrat conforme" field="contract_nr_ok" disabled={!canPieces}/>
              <TG label="Rentré signé" field="rented_signed" disabled={!canPieces}/>
              <TG label="Conforme KYC" field="kyc_compliant" disabled={!canPieces}/>
              <TG label="Justificatifs complets" field="docs_complete" disabled={!canPieces}/>
            </div>
            {canPieces&&<button onClick={function(){updDt({has_problem:!dt.has_problem});}} disabled={isLocked} style={{marginTop:'8px',width:'100%',padding:'9px',fontSize:'12.5px',display:'flex',alignItems:'center',justifyContent:'center',gap:'6px',borderRadius:'8px',transition:'all 0.15s',background:isLocked?'#f3f4f6':dt.has_problem?'rgba(185,28,28,0.82)':'rgba(185,28,28,0.12)',color:isLocked?'#aaa':dt.has_problem?'#fef2f2':'#7f1d1d',border:'1px solid '+(isLocked?'#e5e7eb':dt.has_problem?'#991b1b':'rgba(185,28,28,0.25)'),cursor:isLocked?'not-allowed':'pointer'}}>{dt.has_problem?'⚠️ Problème signalé — Cliquer pour lever':'⚠️ Signaler un problème sur ce dossier'}</button>}
            {!isAnnule&&<button onClick={isLocked?undefined:toggleAnnReq} disabled={isLocked} style={{marginTop:'8px',width:'100%',padding:'9px',fontSize:'12.5px',display:'flex',alignItems:'center',justifyContent:'center',gap:'8px',borderRadius:'8px',transition:'all 0.15s',background:isLocked?'#f3f4f6':annReq?'#cbd5e1':'rgba(0,0,0,0.06)',color:isLocked?'#aaa':annReq?'#334155':'#555',border:'1px solid '+(isLocked?'#e5e7eb':annReq?'#94a3b8':'rgba(0,0,0,0.1)'),cursor:isLocked?'not-allowed':'pointer'}}>{annReq?'⬛ Annulation demandée — Annuler la demande':'⬛ Signaler annulation de ce dossier'}</button>}
          </div>
          <div style={{marginBottom:'20px'}}>
            <div className="sec">Vérifications direction {!canDir&&'· lecture seule'}</div>
            <div className="card" style={{padding:'0 16px'}}>
              <TG label="Dates correctes" field="effect_date_ok" disabled={!canDirEdit}/>
              <div style={{padding:'12px 0',borderBottom:'1px solid #f3f4f6'}}>
                <div style={{fontSize:'13.5px',color:canDirEdit?'#222':'#aaa',marginBottom:'8px'}}>Mono contrat</div>
                <div style={{display:'flex',flexDirection:'column',gap:'6px'}}>
                  {MONO_OPTS.map(function(o){return <label key={o.value} style={{display:'flex',alignItems:'center',gap:'8px',cursor:canDirEdit?'pointer':'not-allowed',opacity:canDirEdit?1:0.5,padding:'7px 10px',border:'1px solid '+(monoType===o.value&&o.value?'#3b82f6':'#e5e7eb'),borderRadius:'8px',background:monoType===o.value&&o.value?'#eff6ff':'#fff',fontSize:'13px'}}><input type="radio" name={'mono_'+contract.id} value={o.value} checked={monoType===o.value} disabled={!canDirEdit} onChange={function(){saveMonoType(o.value);}} style={{width:'auto',display:'inline',padding:0,border:'none',background:'none',cursor:canDirEdit?'pointer':'not-allowed'}}/>{o.label}</label>;})}
                </div>
              </div>
              <div style={{padding:'12px 0',borderBottom:'1px solid #f3f4f6'}}>
                <div style={{fontSize:'13.5px',color:canDirEdit?'#222':'#aaa',marginBottom:'8px'}}>Cotisation payée</div>
                <div style={{display:'flex',flexDirection:'column',gap:'6px'}}>
                  {PAY_OPTS.map(function(o){return <label key={o.value} style={{display:'flex',alignItems:'center',gap:'8px',cursor:canDirEdit?'pointer':'not-allowed',opacity:canDirEdit?1:0.5,padding:'7px 10px',border:'1px solid '+((dt.payment_status||'non_paye')===o.value?'#aaa':'#e5e7eb'),borderRadius:'8px',background:(dt.payment_status||'non_paye')===o.value?o.bg:'#fff',color:o.tx,fontSize:'13px'}}><input type="radio" name={'pay_'+contract.id} value={o.value} checked={(dt.payment_status||'non_paye')===o.value} disabled={!canDirEdit} onChange={function(){if(canDirEdit)updDt({payment_status:o.value});}} style={{width:'auto',display:'inline',padding:0,border:'none',background:'none',cursor:canDirEdit?'pointer':'not-allowed'}}/>{o.label}</label>;})}
                </div>
              </div>
              <div className="cr">
                <span style={{fontSize:'13.5px',color:canDirEdit?'#222':'#aaa'}}>Annuler le dossier</span>
                <label className="toggle" style={{cursor:canDirEdit?'pointer':'not-allowed'}}><input type="checkbox" checked={isAnnule} disabled={!canDirEdit||saving} onChange={function(e){toggleAnnule(e.target.checked);}}/><span className="slider" style={{background:isAnnule?'#111':''}}></span></label>
              </div>
            </div>
          </div>
          <div>
            <div className="sec">Échanges</div>
            <div className="chat-wrap">
              {messages.length===0&&<div style={{fontSize:'13px',color:'#aaa',textAlign:'center',padding:'16px'}}>Aucun échange pour l'instant.</div>}
              {messages.map(function(m){
                const isRight=['manager','direction'].includes(m.author_role);
                const status=m.resolved_status||'pending';
                return <div key={m.id} style={{display:'flex',flexDirection:'column',alignItems:isRight?'flex-end':'flex-start'}}>
                  <div className={'msg '+(isRight?'msg-right':'msg-left')}>
                    <div className="msg-meta">{m.author_name}</div>
                    <div>{m.message}</div>
                    <div className="msg-time">{fdt(m.created_at)}{status==='resolved'&&<span style={{color:'#16a34a',fontWeight:700,marginLeft:'6px'}}>✓ Résolu</span>}{status==='unresolved'&&<span style={{color:'#dc2626',fontWeight:700,marginLeft:'6px'}}>✗ Non résolu</span>}</div>
                  </div>
                  {m.author_role==='conseiller'&&canPieces&&<div style={{display:'flex',gap:'6px',marginTop:'4px'}}>
                    {status!=='resolved'&&<button onClick={function(){setMsgStatus(m.id,'resolved');}} style={{fontSize:'11px',padding:'3px 10px',color:'#16a34a',border:'1px solid #bbf7d0',background:'#f0fdf4',borderRadius:'6px'}}>✓ Résolu</button>}
                    {status!=='unresolved'&&<button onClick={function(){setMsgStatus(m.id,'unresolved');}} style={{fontSize:'11px',padding:'3px 10px',color:'#dc2626',border:'1px solid #fecaca',background:'#fef2f2',borderRadius:'6px'}}>✗ Non résolu</button>}
                  </div>}
                </div>;
              })}
            </div>
            <div style={{display:'flex',gap:'8px',marginTop:'12px'}}>
              <textarea value={newMsg} onChange={function(e){setNewMsg(e.target.value);}} placeholder={isLocked?"Dossier verrouillé — échanges désactivés":"Écrire un message…"} disabled={isLocked} rows={2} style={{resize:'none',flex:1,background:isLocked?'#f9fafb':''}} onKeyDown={function(e){if(!isLocked&&e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}}}/>
              <button onClick={sendMsg} disabled={!newMsg.trim()||saving||isLocked} className="bp" style={{flexShrink:0,alignSelf:'flex-end'}}>Envoyer</button>
            </div>
            <div style={{fontSize:'11px',color:'#aaa',marginTop:'4px'}}>Entrée pour envoyer · Shift+Entrée pour saut de ligne</div>
          </div>
        </div>
      </div>
    </div>
  );
}

function CopyBtn({text}){
  const [copied,setCopied]=useState(false);
  return <span onClick={function(e){e.stopPropagation();navigator.clipboard.writeText(text);setCopied(true);setTimeout(function(){setCopied(false);},1500);}} title={copied?'Copié !':'Copier'} style={{cursor:'pointer',fontSize:'12px',padding:'1px 4px',border:'1px solid '+(copied?'#bbf7d0':'#bfdbfe'),borderRadius:'4px',background:copied?'#f0fdf4':'#eff6ff',color:copied?'#16a34a':'#3b82f6',userSelect:'none',transition:'all 0.2s'}}>{copied?'✓':'⧉'}</span>;
}

function Placeholder({nav,active}){
  const item=nav&&nav.find(function(n){return n.id===active;});
  if(!item)return null;
  return <div style={{padding:'40px'}}>
    <div style={{fontSize:'22px',fontWeight:600,marginBottom:'24px'}}>{item.label}</div>
    <div className="card" style={{padding:'60px 40px',textAlign:'center'}}>
      <div style={{fontSize:'28px',color:'#ccc',marginBottom:'14px'}}>{item.icon}</div>
      <div style={{fontSize:'15px',fontWeight:500,marginBottom:'8px'}}>Module en cours de construction</div>
      <div style={{fontSize:'13.5px',color:'#888',maxWidth:'300px',margin:'0 auto 16px',lineHeight:1.6}}>Ce module sera développé au Sprint {item.s}.</div>
      <span style={{display:'inline-block',background:'#f3f4f6',border:'1px solid #e5e7eb',borderRadius:'8px',padding:'5px 16px',fontSize:'12px',color:'#666'}}>Sprint {item.s}</span>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
