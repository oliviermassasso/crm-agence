            </div>
          </div>

          <div style={{display:'flex',gap:'10px'}}>
            <button onClick={save} disabled={saving} style={{padding:'9px 24px',background:'#1d4ed8',color:'#fff',border:'none',borderRadius:'8px',fontSize:'13px',fontWeight:600}}>
              {saving?'Enregistrement…':'💾 Enregistrer'}
            </button>
            <button onClick={function(){setEditing(null);}} style={{padding:'9px 18px',fontSize:'13px'}}>Annuler</button>
          </div>
        </div>
      )}
    </div>
  );
}

function Configuration({sb,profile,profiles,grilles,setGrilles,objectifs,setObjectifs,primesConfig,setPrimesConfig}){
  const [onglet,setOnglet]=useState('grille');
  const [anneeG,setAnneeG]=useState(new Date().getFullYear());
  const [anneeO,setAnneeO]=useState(new Date().getFullYear());
  const [conseillerO,setConseillerO]=useState(''); // '' = agence
  const [saving,setSaving]=useState(false);
  const [ok,setOk]=useState('');
  const canEdit=profile.role==='direction';

  // ── GRILLE ──
  const annees=Object.keys(grilles).map(Number).sort(function(a,b){return b-a;});
  const grilleActive=grilles[anneeG]||{};

  async function saveGrilleRow(type,taux,fixed,montant_fixe){
    setSaving(true);setOk('');
    const row={annee:anneeG,contract_type:type,taux:fixed?null:parseFloat(taux)||0,fixed:!!fixed,montant_fixe:fixed?parseFloat(montant_fixe)||0:null};
    await sb.from('grilles').upsert(row,{onConflict:'annee,contract_type'});
    setGrilles(function(g){
      const ng=Object.assign({},g);
      if(!ng[anneeG]) ng[anneeG]={};
      ng[anneeG]=Object.assign({},ng[anneeG],{[type]:{taux:row.taux,fixed:row.fixed,montant_fixe:row.montant_fixe}});
      return ng;
    });
    setSaving(false);setOk('Sauvegardé');
    setTimeout(function(){setOk('');},2000);
  }

  async function copyGrille(fromAnnee,toAnnee){
    if(!grilles[fromAnnee]){return;}
    setSaving(true);setOk('');
    const rows=Object.entries(grilles[fromAnnee]).map(function(e){
      return {annee:toAnnee,contract_type:e[0],taux:e[1].taux,fixed:e[1].fixed,montant_fixe:e[1].montant_fixe};
    });
    await sb.from('grilles').upsert(rows,{onConflict:'annee,contract_type'});
    setGrilles(function(g){
      const ng=Object.assign({},g);
      ng[toAnnee]={};
      rows.forEach(function(r){ng[toAnnee][r.contract_type]={taux:r.taux,fixed:r.fixed,montant_fixe:r.montant_fixe};});
      return ng;
    });
    setAnneeG(toAnnee);
    setSaving(false);setOk('Grille '+toAnnee+' créée depuis '+fromAnnee);
  }

  // ── OBJECTIFS ──
  const anneesO=[...new Set((objectifs||[]).map(function(o){return o.annee;}))].sort(function(a,b){return b-a;});
  if(anneesO.length===0) anneesO.push(new Date().getFullYear());

  // State local pour édition groupée
  const [localVals,setLocalVals]=useState({});
  const [dirty,setDirty]=useState(false);

  // Initialiser localVals quand anneeO ou conseillerO change
  useEffect(function(){
    const map={};
    (objectifs||[]).filter(function(o){
      return o.annee===anneeO&&(conseillerO?o.conseiller_id===conseillerO:!o.conseiller_id);
    }).forEach(function(o){
      const k=(o.famille||'')+'|'+(o.contract_type||'');
      map[k]=o.montant!=null?String(o.montant):'';
    });
    setLocalVals(map);
    setDirty(false);
  },[anneeO,conseillerO,objectifs]);

  function getLocalVal(fam,type){
    const k=(fam||'')+'|'+(type||'');
    return localVals[k]!==undefined?localVals[k]:'';
  }

  function setLocalVal(fam,type,val){
    const k=(fam||'')+'|'+(type||'');
    setLocalVals(function(prev){return Object.assign({},prev,{[k]:val});});
    setDirty(true);
    window.__configDirty=true;
  }

  useEffect(function(){window.__configDirty=dirty;},[dirty]);

  async function saveAllObjectifs(){
    setSaving(true);setOk('');
    const consId=conseillerO||null;

    // Supprimer toutes les lignes existantes pour cette année/conseiller
    let delQ=sb.from('objectifs').delete().eq('annee',anneeO);
    if(consId) delQ=delQ.eq('conseiller_id',consId); else delQ=delQ.is('conseiller_id',null);
    const delR=await delQ;
    if(delR.error){alert('Erreur suppression : '+delR.error.message);setSaving(false);return;}

    // Réinsérer uniquement les valeurs non vides
    const rows=[];
    Object.entries(localVals).forEach(function(e){
      const v=parseFloat(e[1]);
      if(!e[1]||isNaN(v)||v<=0) return;
      const parts=e[0].split('|');
      const fam=parts[0]||null;
      const typ=parts[1]||null;
      rows.push({annee:anneeO,conseiller_id:consId,famille:fam,contract_type:typ,montant:v});
    });

    if(rows.length>0){
      const insR=await sb.from('objectifs').insert(rows);
      if(insR.error){alert('Erreur insertion : '+insR.error.message);setSaving(false);return;}
    }

    // Recharger depuis Supabase pour garantir la cohérence
    const reloadR=await sb.from('objectifs').select('*');
    if(!reloadR.error) setObjectifs(reloadR.data||[]);

    setDirty(false);
    window.__configDirty=false;
    setSaving(false);setOk('✓ Objectifs enregistrés');
    setTimeout(function(){setOk('');},3000);
  }

  async function copyObjectifs(fromAnnee,toAnnee){
    setSaving(true);setOk('');
    const src=(objectifs||[]).filter(function(o){return o.annee===fromAnnee;});
    const rows=src.map(function(o){return {annee:toAnnee,conseiller_id:o.conseiller_id,famille:o.famille,contract_type:o.contract_type,montant:o.montant};});
    await sb.from('objectifs').delete().eq('annee',toAnnee);
    if(rows.length>0) await sb.from('objectifs').insert(rows);
    const reloadR=await sb.from('objectifs').select('*');
    if(!reloadR.error) setObjectifs(reloadR.data||[]);
    setAnneeO(toAnnee);
    setSaving(false);setOk('Objectifs '+toAnnee+' créés depuis '+fromAnnee);
  }

  const actifProfiles=profiles.filter(function(p){return p.role!=='direction'&&p.actif!==false;});

  return(
    <div style={{padding:'28px 32px',maxWidth:'900px'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'22px',flexWrap:'wrap',gap:'12px'}}>
        <div><div style={{fontSize:'22px',fontWeight:600}}>Configuration</div><div style={{fontSize:'13px',color:'#666'}}>Grilles de rémunération et objectifs</div></div>
        <div style={{display:'flex',alignItems:'center',gap:'12px'}}>
          {ok&&<span style={{fontSize:'13px',color:'#059669',fontWeight:500}}>{ok}</span>}
          {dirty&&onglet==='objectifs'&&canEdit&&(
            <>
              <span style={{fontSize:'12.5px',color:'#92400e',fontWeight:500}}>● Modifications non enregistrées</span>
              <button className="bp" onClick={saveAllObjectifs} disabled={saving} style={{padding:'7px 18px',background:'#1d4ed8',color:'#fff',border:'none'}}>
                {saving?'Enregistrement…':'💾 Enregistrer'}
              </button>
            </>
          )}
        </div>
      </div>

      {/* Onglets */}
      <div style={{display:'flex',border:'1px solid #e5e7eb',borderRadius:'8px',overflow:'hidden',marginBottom:'22px',width:'fit-content'}}>
        <button onClick={function(){setOnglet('grille');}} style={{padding:'8px 20px',fontSize:'13px',border:'none',borderRadius:0,background:onglet==='grille'?'#1d4ed8':'#fff',color:onglet==='grille'?'#fff':'#555'}}>📊 Grille de rémunération</button>
        <button onClick={function(){setOnglet('objectifs');}} style={{padding:'8px 20px',fontSize:'13px',border:'none',borderLeft:'1px solid #e5e7eb',borderRadius:0,background:onglet==='objectifs'?'#1d4ed8':'#fff',color:onglet==='objectifs'?'#fff':'#555'}}>🎯 Objectifs</button>
        <button onClick={function(){setOnglet('primes');}} style={{padding:'8px 20px',fontSize:'13px',border:'none',borderLeft:'1px solid #e5e7eb',borderRadius:0,background:onglet==='primes'?'#1d4ed8':'#fff',color:onglet==='primes'?'#fff':'#555'}}>🏆 Primes</button>
      </div>

      {onglet==='grille'&&(
        <div>
          <div style={{display:'flex',gap:'10px',alignItems:'center',marginBottom:'16px',flexWrap:'wrap'}}>
            <select value={anneeG} onChange={function(e){setAnneeG(parseInt(e.target.value));}} style={{width:'auto',padding:'7px 12px'}}>
              {annees.map(function(a){return <option key={a} value={a}>{a}</option>;})}
            </select>
            {canEdit&&(
              <button onClick={function(){copyGrille(anneeG,anneeG+1);}} disabled={saving||!!grilles[anneeG+1]} style={{fontSize:'12.5px',padding:'7px 14px'}}
                title={grilles[anneeG+1]?'Grille '+(anneeG+1)+' existe déjà':''}>
                + Créer grille {anneeG+1} (copie {anneeG})
              </button>
            )}
            {!canEdit&&<span style={{fontSize:'12px',color:'#aaa'}}>Lecture seule</span>}
          </div>

          {FAMILIES.map(function(fam){
            return(
              <div key={fam.name} style={{marginBottom:'16px'}}>
                <div style={{fontSize:'12px',fontWeight:600,color:fam.color,padding:'6px 10px',background:fam.bg,borderRadius:'6px 6px 0 0',borderBottom:'1px solid #e5e7eb'}}>{fam.name}</div>
                <div className="card" style={{borderRadius:'0 0 8px 8px',overflow:'hidden'}}>
                  <table>
                    <thead><tr>
                      <th style={{width:'40%'}}>Type de contrat</th>
                      <th>Mode</th>
                      <th>Taux (%)</th>
                      <th>Montant fixe (€)</th>
                    </tr></thead>
                    <tbody>
                      {fam.types.map(function(type){
                        const row=grilleActive[type]||{taux:null,fixed:false,montant_fixe:null};
                        return <GrilleRow key={type} type={type} row={row} canEdit={canEdit} onSave={saveGrilleRow}/>;
                      })}
                    </tbody>
                  </table>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {onglet==='objectifs'&&(
        <div>
          <div style={{display:'flex',gap:'10px',alignItems:'center',marginBottom:'16px',flexWrap:'wrap'}}>
            <select value={anneeO} onChange={function(e){setAnneeO(parseInt(e.target.value));}} style={{width:'auto',padding:'7px 12px'}}>
              {anneesO.map(function(a){return <option key={a} value={a}>{a}</option>;})}
            </select>
            <select value={conseillerO} onChange={function(e){setConseillerO(e.target.value);}} style={{width:'auto',padding:'7px 12px'}}>
              <option value="">🏢 Objectif agence</option>
              {actifProfiles.map(function(p){return <option key={p.id} value={p.id}>{p.full_name}</option>;})}
            </select>
            {canEdit&&(
              <button onClick={function(){copyObjectifs(anneeO,anneeO+1);}} disabled={saving||(objectifs||[]).some(function(o){return o.annee===anneeO+1;})} style={{fontSize:'12.5px',padding:'7px 14px'}}>
                + Créer objectifs {anneeO+1} (copie {anneeO})
              </button>
            )}
          </div>

          <div className="card" style={{overflow:'hidden',marginBottom:'12px'}}>
            <table>
              <thead><tr>
                <th style={{width:'55%'}}>Famille / Type</th>
                <th style={{textAlign:'right'}}>Objectif annuel (€)</th>
              </tr></thead>
              <tbody>
                {/* Production totale AXA */}
                <tr style={{background:'#eff6ff'}}>
                  <td style={{fontWeight:700,fontSize:'12.5px',color:'#1d4ed8'}}>🎯 Production totale AXA</td>
                  <td style={{textAlign:'right'}}>
                    {canEdit
                      ?<input type="number" value={getLocalVal('__total__',null)} onChange={function(e){setLocalVal('__total__',null,e.target.value);}} style={{width:'130px',padding:'4px 8px',fontSize:'12px',textAlign:'right'}} placeholder="—"/>
                      :<span style={{fontSize:'12.5px',fontWeight:600}}>{getLocalVal('__total__',null)?feur0(parseFloat(getLocalVal('__total__',null))):'—'}</span>
                    }
                  </td>
                </tr>
                {/* Toutes les familles */}
                {FAMILIES.map(function(fam){
                  return [
                    <tr key={fam.name} style={{background:fam.bg}}>
                      <td style={{fontWeight:600,color:fam.color,fontSize:'12px'}}>{fam.name}</td>
                      <td style={{textAlign:'right'}}>
                        {canEdit
                          ?<input type="number" value={getLocalVal(fam.name,null)} onChange={function(e){setLocalVal(fam.name,null,e.target.value);}} style={{width:'130px',padding:'4px 8px',fontSize:'12px',textAlign:'right'}} placeholder="—"/>
                          :<span style={{fontSize:'12.5px'}}>{getLocalVal(fam.name,null)?feur0(parseFloat(getLocalVal(fam.name,null))):'—'}</span>
                        }
                      </td>
                    </tr>
                  ].concat(fam.types.map(function(type){
                    return(
                      <tr key={type} style={{background:'#fafafa'}}>
                        <td style={{paddingLeft:'24px',fontSize:'12px',color:'#666'}}>↳ {type}</td>
                        <td style={{textAlign:'right'}}>
                          {canEdit
                            ?<input type="number" value={getLocalVal(null,type)} onChange={function(e){setLocalVal(null,type,e.target.value);}} style={{width:'130px',padding:'4px 8px',fontSize:'12px',textAlign:'right'}} placeholder="—"/>
                            :<span style={{fontSize:'12.5px'}}>{getLocalVal(null,type)?feur0(parseFloat(getLocalVal(null,type))):'—'}</span>
                          }
                        </td>
                      </tr>
                    );
                  }));
                })}
              </tbody>
            </table>
          </div>

          {canEdit&&(
            <div style={{display:'flex',justifyContent:'flex-end',gap:'10px',alignItems:'center'}}>
              {dirty&&<span style={{fontSize:'12.5px',color:'#92400e'}}>● Modifications non enregistrées</span>}
              <button className="bp" onClick={saveAllObjectifs} disabled={saving||!dirty} style={{padding:'9px 20px'}}>
                {saving?'Enregistrement…':'💾 Enregistrer les objectifs'}
              </button>
            </div>
          )}
        </div>
      )}

      {onglet==='primes'&&(
        <PrimesConfig sb={sb} profile={profile} profiles={profiles} primesConfig={primesConfig} setPrimesConfig={setPrimesConfig} canEdit={canEdit}/>
      )}
    </div>
  );
}


function PageSalaire({contracts,profiles,profile,primesConfig,grilles}){
  const isDir=profile.role==='direction';
  const isCollab=profile.role==='conseiller';
  const today=new Date();
  const [year,setYear]=useState(today.getFullYear());
  const [month,setMonth]=useState(today.getMonth()+1);
  const [selCons,setSelCons]=useState(isCollab?profile.id:'');
  const [showPdf,setShowPdf]=useState(false);

  const actifs=profiles.filter(function(p){return p.role!=='direction';});
  const consIds=selCons?[selCons]:(isDir?actifs.map(function(p){return p.id;}):([profile.id]));

  // Calcul commissions pour un conseiller sur le mois
  function getContratsForPrime(consId,rule){
    const dateRef=rule.date_ref||'emission';
    const types=rule.contract_types&&rule.contract_types.length>0?rule.contract_types:null;
    return contracts.filter(function(c){
      if(c.conseiller_id!==consId) return false;
      if(c.status==='ANNULE') return false;
      if(!rule.criteres.inclure_payes&&c.status==='PAYE') return false;
      const dt=c.document_tracking||{};
      const crit=rule.criteres||{};
      if(crit.n_contrat_ok&&!dt.n_contrat_ok) return false;
      if(crit.rentre_signe&&!dt.rentre_signe) return false;
      if(crit.kyc_ok&&!dt.kyc_ok) return false;
      if(crit.justificatifs_ok&&!dt.justificatifs_ok) return false;
      if(crit.date_ok&&!dt.date_ok) return false;
      if(crit.cotisation_ok&&!dt.cotisation_ok) return false;
      if(crit.exclure_impayes&&dt.cotisation_ok===false) return false;
      if(types&&!types.includes(c.contract_type)) return false;
      // Période selon périodicité
      const d=new Date(dateRef==='effet'?(c.effect_date||c.emission_date):c.emission_date);
      const cy=d.getFullYear(),cm=d.getMonth()+1;
      const per=rule.periodicite||'mensuel';
      if(per==='mensuel') return cy===year&&cm===month;
      if(per==='trimestriel'){const qt=Math.ceil(month/3);return cy===year&&Math.ceil(cm/3)===qt;}
      if(per==='semestriel'){const sm=month<=6?1:2;return cy===year&&(cm<=6?1:2)===sm;}
      if(per==='annuel') return cy===year;
      return false;
    });
  }

  function calcComForCons(consId){
    const grilleYear=grilles[year]||grilles[Object.keys(grilles).sort().pop()]||{};
    return contracts.filter(function(c){
      if(c.conseiller_id!==consId||c.status==='ANNULE') return false;
      const d=new Date(c.emission_date);
      return d.getFullYear()===year&&d.getMonth()+1===month;
    }).map(function(c){
      const g=grilleYear[c.contract_type]||{};
      let com=0;
      if(c.manual_commission!=null) com=c.manual_commission;
      else if(g.fixed) com=g.montant_fixe||0;
      else com=Math.round((c.annual_premium||0)*(g.taux||0)/100);
      return {contract:c,commission:com};
    }).filter(function(x){return x.commission>0||x.contract.manual_commission!=null;});
  }

  function calcPrimesForCons(consId){
    const rules=(primesConfig||[]).filter(function(r){
      return r.annee===year&&(!r.conseiller_id||r.conseiller_id===consId);
    });
    return rules.map(function(rule){
      const c=getContratsForPrime(consId,rule);
      const realise=rule.seuil_type==='nb'?c.length:c.reduce(function(s,x){return s+(x.annual_premium||0);},0);
      const atteint=realise>=rule.seuil;
      return {rule:rule,contrats:c,realise:realise,atteint:atteint,prime:atteint?rule.prime_montant:0};
    });
  }

  const data=consIds.map(function(id){
    const p=profiles.find(function(x){return x.id===id;})||{full_name:'—'};
    const coms=calcComForCons(id);
    const primes=calcPrimesForCons(id);
    const totalCom=coms.reduce(function(s,x){return s+x.commission;},0);
    const totalPrimes=primes.reduce(function(s,x){return s+x.prime;},0);
    return {profile:p,coms:coms,primes:primes,totalCom:totalCom,totalPrimes:totalPrimes,total:totalCom+totalPrimes};
  }).filter(function(d){return d.coms.length>0||d.primes.some(function(p){return p.atteint;});});

  const pLabel=MONTHS[month-1]+' '+year;

  return(
    <div style={{padding:'28px 32px',maxWidth:'960px'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'22px',flexWrap:'wrap',gap:'12px'}}>
        <div>
          <div style={{fontSize:'22px',fontWeight:600}}>Salaires</div>
          <div style={{fontSize:'13px',color:'#666'}}>Commissions + primes — {pLabel}</div>
        </div>
      </div>

      {/* Filtres */}
      <div style={{display:'flex',gap:'10px',marginBottom:'22px',flexWrap:'wrap',alignItems:'center'}}>
        <select value={month} onChange={function(e){setMonth(parseInt(e.target.value));}} style={{padding:'7px 12px',width:'auto'}}>
          {MONTHS.map(function(m,i){return <option key={i} value={i+1}>{m}</option>;})}
        </select>
        <select value={year} onChange={function(e){setYear(parseInt(e.target.value));}} style={{padding:'7px 12px',width:'auto'}}>
          {[2024,2025,2026,2027].map(function(y){return <option key={y} value={y}>{y}</option>;})}
        </select>
        {isDir&&(
          <select value={selCons} onChange={function(e){setSelCons(e.target.value);}} style={{padding:'7px 12px',width:'auto'}}>
            <option value="">Tous les conseillers</option>
            {actifs.map(function(p){return <option key={p.id} value={p.id}>{p.full_name}</option>;})}
          </select>
        )}
      </div>

      {data.length===0&&<div style={{color:'#aaa',fontSize:'13px',textAlign:'center',padding:'40px'}}>Aucune commission ni prime pour cette période.</div>}

      {data.map(function(d){
        return(
          <div key={d.profile.id} style={{marginBottom:'28px',border:'1px solid #e5e7eb',borderRadius:'12px',overflow:'hidden'}}>
            {/* Header conseiller */}
            <div style={{background:'linear-gradient(to bottom,#dbeafe,#1d4ed8 60%,#1e3a8a)',padding:'14px 20px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{fontSize:'15px',fontWeight:700,color:'#fff'}}>{d.profile.full_name}</span>
              <span style={{fontSize:'14px',fontWeight:700,color:'#fff'}}>{feur0(d.total)} <span style={{fontWeight:400,fontSize:'12px',opacity:0.8}}>net à payer</span></span>
            </div>

            <div style={{padding:'18px 20px'}}>
              {/* Commissions */}
              {d.coms.length>0&&(
                <div style={{marginBottom:'20px'}}>
                  <div style={{fontSize:'13px',fontWeight:600,color:'#333',marginBottom:'10px',display:'flex',justifyContent:'space-between'}}>
                    <span>📋 Commissions</span>
                    <span style={{color:'#1d4ed8'}}>{feur0(d.totalCom)}</span>
                  </div>
                  <table style={{width:'100%',borderCollapse:'collapse',fontSize:'12.5px'}}>
                    <thead>
                      <tr style={{background:'#f8fafc',borderBottom:'1px solid #e5e7eb'}}>
                        <th style={{padding:'7px 10px',textAlign:'left',fontWeight:600,color:'#666'}}>Client</th>
                        <th style={{padding:'7px 10px',textAlign:'left',fontWeight:600,color:'#666'}}>Produit</th>
                        <th style={{padding:'7px 10px',textAlign:'right',fontWeight:600,color:'#666'}}>Prime annuelle</th>
                        <th style={{padding:'7px 10px',textAlign:'right',fontWeight:600,color:'#666'}}>Commission</th>
                      </tr>
                    </thead>
                    <tbody>
                      {d.coms.map(function(x,i){
                        return(
                          <tr key={i} style={{borderBottom:'1px solid #f9fafb'}}>
                            <td style={{padding:'7px 10px',color:'#333'}}>{x.contract.client_name}</td>
                            <td style={{padding:'7px 10px',color:'#555'}}>{x.contract.contract_type}</td>
                            <td style={{padding:'7px 10px',textAlign:'right',color:'#555'}}>{feur0(x.contract.annual_premium||0)}</td>
                            <td style={{padding:'7px 10px',textAlign:'right',fontWeight:600,color:'#1d4ed8'}}>{feur0(x.commission)}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              )}

              {/* Primes */}
              {d.primes.length>0&&(
                <div>
                  <div style={{fontSize:'13px',fontWeight:600,color:'#333',marginBottom:'10px',display:'flex',justifyContent:'space-between'}}>
                    <span>🏆 Primes</span>
                    <span style={{color:'#059669'}}>{feur0(d.totalPrimes)}</span>
                  </div>
                  <table style={{width:'100%',borderCollapse:'collapse',fontSize:'12.5px'}}>
                    <thead>
                      <tr style={{background:'#f8fafc',borderBottom:'1px solid #e5e7eb'}}>
                        <th style={{padding:'7px 10px',textAlign:'left',fontWeight:600,color:'#666'}}>Règle</th>
                        <th style={{padding:'7px 10px',textAlign:'left',fontWeight:600,color:'#666'}}>Produits</th>
                        <th style={{padding:'7px 10px',textAlign:'right',fontWeight:600,color:'#666'}}>Réalisé</th>
                        <th style={{padding:'7px 10px',textAlign:'right',fontWeight:600,color:'#666'}}>Seuil</th>
                        <th style={{padding:'7px 10px',textAlign:'right',fontWeight:600,color:'#666'}}>Prime</th>
                        <th style={{padding:'7px 10px',textAlign:'center',fontWeight:600,color:'#666'}}>Statut</th>
                      </tr>
                    </thead>
                    <tbody>
                      {d.primes.map(function(x,i){
                        const types=x.rule.contract_types&&x.rule.contract_types.length>0?x.rule.contract_types.join(', '):'Tous';
                        return(
                          <tr key={i} style={{borderBottom:'1px solid #f9fafb',background:x.atteint?'#f0fdf4':'#fff'}}>
                            <td style={{padding:'7px 10px',fontWeight:500}}>{x.rule.nom}</td>
                            <td style={{padding:'7px 10px',color:'#666',fontSize:'11.5px'}}>{types.length>40?types.substring(0,40)+'…':types}</td>
                            <td style={{padding:'7px 10px',textAlign:'right',fontWeight:600}}>{x.rule.seuil_type==='nb'?x.realise+' contrats':feur0(x.realise)}</td>
                            <td style={{padding:'7px 10px',textAlign:'right',color:'#888'}}>{x.rule.seuil_type==='nb'?x.rule.seuil+' contrats':feur0(x.rule.seuil)}</td>
                            <td style={{padding:'7px 10px',textAlign:'right',fontWeight:700,color:x.atteint?'#059669':'#aaa'}}>{x.atteint?feur0(x.prime):'—'}</td>
                            <td style={{padding:'7px 10px',textAlign:'center',fontSize:'16px'}}>{x.atteint?'✅':'❌'}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              )}

              {/* Total */}
              <div style={{marginTop:'16px',paddingTop:'14px',borderTop:'2px solid #e5e7eb',display:'flex',justifyContent:'flex-end',gap:'24px',fontSize:'13px'}}>
                {d.totalCom>0&&<span style={{color:'#666'}}>Commissions : <b style={{color:'#1d4ed8'}}>{feur0(d.totalCom)}</b></span>}
                {d.totalPrimes>0&&<span style={{color:'#666'}}>Primes : <b style={{color:'#059669'}}>{feur0(d.totalPrimes)}</b></span>}
                <span style={{color:'#111',fontWeight:700,fontSize:'14px'}}>Total : {feur0(d.total)}</span>
                <button onClick={function(){
                  const w=window.open('','_blank');
                  w.document.write('<html><head><title>Salaire '+d.profile.full_name+' — '+pLabel+'</title><style>body{font-family:Arial,sans-serif;padding:32px;max-width:800px;margin:0 auto}h1{font-size:18px;margin-bottom:4px}h2{font-size:14px;color:#1d4ed8;margin:20px 0 8px}table{width:100%;border-collapse:collapse;margin-bottom:8px}th{background:#f3f4f6;padding:7px 10px;text-align:left;font-size:12px;color:#666;border-bottom:1px solid #e5e7eb}td{padding:7px 10px;font-size:12px;border-bottom:1px solid #f9fafb}.total{text-align:right;padding-top:12px;border-top:2px solid #e5e7eb;font-weight:700;font-size:14px}@media print{button{display:none}}</style></head><body>');
                  w.document.write('<h1>Bulletin de commissions — '+d.profile.full_name+'</h1><p style="color:#666;font-size:13px">Période : '+pLabel+'</p>');
                  if(d.coms.length>0){
                    w.document.write('<h2>Commissions ('+feur0(d.totalCom)+')</h2><table><tr><th>Client</th><th>Produit</th><th style="text-align:right">Prime annuelle</th><th style="text-align:right">Commission</th></tr>');
                    d.coms.forEach(function(x){w.document.write('<tr><td>'+x.contract.client_name+'</td><td>'+x.contract.contract_type+'</td><td style="text-align:right">'+feur0(x.contract.annual_premium||0)+'</td><td style="text-align:right"><b>'+feur0(x.commission)+'</b></td></tr>');});
                    w.document.write('</table>');
                  }
                  if(d.primes.length>0){
                    w.document.write('<h2>Primes ('+feur0(d.totalPrimes)+')</h2><table><tr><th>Règle</th><th>Réalisé</th><th>Seuil</th><th style="text-align:right">Prime</th><th style="text-align:center">Statut</th></tr>');
                    d.primes.forEach(function(x){w.document.write('<tr><td>'+x.rule.nom+'</td><td>'+(x.rule.seuil_type==='nb'?x.realise+' contrats':feur0(x.realise))+'</td><td>'+(x.rule.seuil_type==='nb'?x.rule.seuil+' contrats':feur0(x.rule.seuil))+'</td><td style="text-align:right"><b>'+(x.atteint?feur0(x.prime):'—')+'</b></td><td style="text-align:center">'+(x.atteint?'✓ Atteint':'✗ Non atteint')+'</td></tr>');});
                    w.document.write('</table>');
                  }
                  w.document.write('<div class="total">Total net : '+feur0(d.total)+'</div>');
                  w.document.write('<script>window.print();<\/script></body></html>');
                  w.document.close();
                }} style={{padding:'5px 14px',fontSize:'12px',background:'#f3f4f6',border:'1px solid #e5e7eb',borderRadius:'6px',cursor:'pointer'}}>🖨 PDF</button>
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

  return(
    <div style={{padding:'40px',maxWidth:'700px'}}>
      <div style={{fontSize:'22px',fontWeight:600,marginBottom:'6px'}}>🌴 Congés</div>
      <div style={{fontSize:'13px',color:'#888',marginBottom:'28px'}}>Module en cours de construction</div>
      <div className="card" style={{padding:'28px'}}>
        <div style={{fontSize:'14px',fontWeight:600,marginBottom:'16px',color:'#333'}}>Ce module permettra :</div>
        <div style={{display:'flex',flexDirection:'column',gap:'10px',fontSize:'13.5px',color:'#555',lineHeight:1.6}}>
          {!isDir&&<div>✦ Soumettre des demandes de congés (CP, RTT, sans solde…)</div>}
          {!isDir&&<div>✦ Suivre le statut de vos demandes : en attente, validé, refusé</div>}
          {!isDir&&<div>✦ Visualiser votre planning personnel</div>}
          {isDir&&<div>✦ Valider ou refuser les demandes de congés</div>}
          {isDir&&<div>✦ Visualiser le planning de toute l'équipe</div>}
          {isDir&&<div>✦ Gérer les soldes de congés par collaborateur</div>}
          <div>✦ Vue planning mensuelle avec indication des absences</div>
          <div>✦ Notifications lors des changements de statut</div>
        </div>
        <div style={{marginTop:'20px',padding:'12px 16px',background:'#f8fafc',borderRadius:'8px',border:'1px solid #e5e7eb',fontSize:'12.5px',color:'#888'}}>

function Placeholder({nav,active}){
  const item=nav&&nav.find(function(n){return n.id===active;});
  if(!item)return null;
  return <div style={{padding:'40px'}}>
    <div style={{fontSize:'22px',fontWeight:600,marginBottom:'24px'}}>{item.label}</div>
    <div className="card" style={{padding:'60px 40px',textAlign:'center'}}>
      <div style={{fontSize:'28px',color:'#ccc',marginBottom:'14px'}}>{item.icon}</div>
      <div style={{fontSize:'15px',fontWeight:500,marginBottom:'8px'}}>Module en cours de construction</div>
      <div style={{fontSize:'13.5px',color:'#888',maxWidth:'300px',margin:'0 auto 16px',lineHeight:1.6}}>Ce module sera développé au Sprint {item.s}.</div>
      <span style={{display:'inline-block',background:'#f3f4f6',border:'1px solid #e5e7eb',borderRadius:'8px',padding:'5px 16px',fontSize:'12px',color:'#666'}}>Sprint {item.s}</span>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
