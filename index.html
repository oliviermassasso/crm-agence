<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM Agence</title>
<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f9fafb;color:#111;}
input,select,textarea,button{font-family:inherit;font-size:14px;outline:none;}
input,select,textarea{display:block;width:100%;padding:9px 12px;border:1px solid #e5e7eb;border-radius:8px;background:#fff;color:#111;}
input:focus,select:focus,textarea:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,0.1);}
button{padding:9px 16px;border:1px solid #e5e7eb;border-radius:8px;background:#fff;color:#111;cursor:pointer;transition:background 0.15s;white-space:nowrap;}
button:hover:not(:disabled){background:#f3f4f6;}
button:disabled{opacity:0.5;cursor:not-allowed;}
.bp{background:#1d4ed8;color:#fff;border-color:#1d4ed8;font-weight:500;}
.bp:hover:not(:disabled){background:#1e40af;}
label{display:block;font-size:12.5px;color:#555;margin-bottom:4px;font-weight:500;}
.fg{margin-bottom:16px;}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;}
.badge{display:inline-block;padding:2px 9px;border-radius:100px;font-size:11.5px;font-weight:500;}
table{width:100%;border-collapse:collapse;font-size:13.5px;}
th{background:#f9fafb;color:#555;font-size:11px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;padding:10px 14px;text-align:left;border-bottom:1px solid #e5e7eb;}
td{padding:11px 14px;border-bottom:1px solid #f3f4f6;color:#333;}
tr:hover td{background:#fafafa;}
tr:last-child td{border-bottom:none;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.35);display:flex;justify-content:flex-end;z-index:100;}
.panel{background:#fff;width:500px;height:100vh;overflow-y:auto;box-shadow:-4px 0 24px rgba(0,0,0,0.12);}
.sec{font-size:11px;font-weight:600;letter-spacing:0.8px;text-transform:uppercase;color:#999;margin-bottom:10px;}
.cr{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f3f4f6;}
.cr:last-child{border-bottom:none;}
.toggle{position:relative;display:inline-block;width:40px;height:22px;flex-shrink:0;}
.toggle input{opacity:0;width:0;height:0;}
.slider{position:absolute;cursor:pointer;inset:0;background:#e5e7eb;border-radius:22px;transition:.2s;}
.slider:before{position:absolute;content:"";height:16px;width:16px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s;}
input:checked+.slider{background:#22c55e;}
input:checked+.slider:before{transform:translateX(18px);}
input:disabled+.slider{opacity:.5;cursor:not-allowed;}
.mb{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:8px;line-height:1.5;}
.mbm{background:#eff6ff;border-left:3px solid #3b82f6;}
.mbc{background:#f0fdf4;border-left:3px solid #22c55e;}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-thumb{background:#e5e7eb;border-radius:3px;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useCallback}=React;

const SB_URL='https://hmuhuokfbfpcnovmllti.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhtdWh1b2tmYmZwY25vdm1sbHRpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2ODYyNzgsImV4cCI6MjA5MjI2MjI3OH0.aP_M2NwFa8Uk6yGFYAI6os0gNOzuulQJm2sDWIitjRQ';

const DEFAULT_TYPES=[
  'Auto/Moto','Courtage Auto/Moto','MRH','PJ','Caravane/Camping-car/Remorque','EDPM','Plaisance',
  'Scolaire','Voyage','Courtage IARD Part','Autres contrats AXA','Ma PA','Prévoyance Pro.',
  'CAP Prévoyance Part.','CAP AVIZEN','ARC','ENTOURAGE','ESSENCIEL','Courtage Prévoyance',
  'Ma Santé TNS & Retraités','Ma Santé HORS TNS & Retraités','Santé AGIPI','Courtage Santé',
  'VTC','MRP','MRI','MRE','RC Pro.','Décennale','Bris Machine','Garages','Flotte',
  'Courtage IARD Pro','Collectives','Crédit Conso. Hors Ass AXA','Crédit Conso. Avec Ass AXA',
  'AXA Banque CB Visa','AXA Banque CB Premier','AXA Banque CB Infinite','Ogoon',
  'Mobilité bancaire','Epargne (réserve, livret A, PEA, etc.)','FAR Retraite (apport affaire)',
  'Assurance Vie (apport affaire)','Ass Vie & Retraite PUVL sup 5000€',
  'Ass Vie & Retraite PUVL sup 100000€','FAR Retraite VLP sup 1000€/an'
];

const PROVS=['Leads / E-contact AXA','Leads / E-contact AGENCE','PRVT','Rebond','Reco','Demande du client'];

const NAV={
  direction:[
    {id:'saisir-contrat',label:'Saisir un contrat',icon:'+'},
    {id:'suivi-dossiers',label:'Suivi des dossiers',icon:'≡'},
    {id:'tableau-bord',label:'Tableau de bord',icon:'◉',s:3},
    {id:'commissions',label:'Commissions',icon:'€',s:4},
    {id:'resiliations',label:'Résiliations',icon:'↩',s:7},
    {id:'salaires',label:'Salaires',icon:'∑',s:6},
    {id:'configuration',label:'Configuration',icon:'⚙',s:5},
  ],
  manager:[
    {id:'saisir-contrat',label:'Saisir un contrat',icon:'+'},
    {id:'suivi-dossiers',label:'Suivi des dossiers',icon:'≡'},
    {id:'tableau-bord',label:'Tableau de bord',icon:'◉',s:3},
    {id:'commissions',label:'Commissions',icon:'€',s:4},
    {id:'resiliations',label:'Résiliations',icon:'↩',s:7},
  ],
  conseiller:[
    {id:'saisir-contrat',label:'Saisir un contrat',icon:'+'},
    {id:'mes-dossiers',label:'Mes dossiers',icon:'≡'},
    {id:'mes-commissions',label:'Mes commissions',icon:'€',s:4},
  ]
};

const RL={direction:'Direction',manager:'Manager',conseiller:'Conseiller'};
const RC={direction:{bg:'#dbeafe',tx:'#1e40af'},manager:{bg:'#fef3c7',tx:'#92400e'},conseiller:{bg:'#d1fae5',tx:'#065f46'}};
const today=()=>new Date().toISOString().split('T')[0];
const fdate=d=>d?new Date(d).toLocaleDateString('fr-FR'):'—';
const feur=n=>(n||n===0)?new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',minimumFractionDigits:0}).format(n):'—';

const MONO_OPTS=[
  {value:'',label:'Aucun'},
  {value:'mono',label:'Mono contrat (com = 0€)'},
  {value:'mono_sante',label:'Mono santé (taux com − 1%)'},
  {value:'mono_pro',label:'Mono pro (taux com − 1%)'},
];

function docStatus(dt){
  if(!dt) return {l:'Non vérifié',bg:'#f3f4f6',tx:'#374151'};
  if(dt.rented_signed&&dt.kyc_compliant&&dt.docs_complete) return {l:'Dossier complet',bg:'#d1fae5',tx:'#065f46'};
  if(dt.manager_comment&&!dt.action_done) return {l:'Action requise',bg:'#fef3c7',tx:'#92400e'};
  if(!dt.rented_signed&&!dt.kyc_compliant&&!dt.docs_complete) return {l:'Non vérifié',bg:'#f3f4f6',tx:'#374151'};
  return {l:'En cours',bg:'#fef3c7',tx:'#92400e'};
}

/* ═══════════════════════════════════════ APP ROOT */
function App(){
  const [profile,setProfile]=useState(null);
  const [sb,setSb]=useState(null);
  const [contracts,setContracts]=useState([]);
  const [profiles,setProfiles]=useState([]);
  const [active,setActive]=useState(null);
  const [selected,setSelected]=useState(null);
  const [lf,setLf]=useState({email:'',password:''});
  const [le,setLe]=useState('');
  const [ll,setLl]=useState(false);

  const load=useCallback(async(cl,p)=>{
    const {data:ps}=await cl.from('profiles').select('*').order('full_name');
    setProfiles(ps||[]);
    let q=cl.from('contracts').select('*,document_tracking(*),conseiller:conseiller_id(id,full_name,role)');
    if(p.role==='conseiller') q=q.eq('conseiller_id',p.id);
    const {data:cs}=await q.order('created_at',{ascending:false});
    setContracts(cs||[]);
  },[]);

  const login=async()=>{
    setLe('');setLl(true);
    try{
      const cl=window.supabase.createClient(SB_URL,SB_KEY);
      const {data,error:ae}=await cl.auth.signInWithPassword({email:lf.email,password:lf.password});
      if(ae){setLe(ae.message);setLl(false);return;}
      const {data:p}=await cl.from('profiles').select('*').eq('id',data.user.id).single();
      if(!p){setLe('Profil introuvable.');setLl(false);return;}
      setSb(cl);setProfile(p);setActive(NAV[p.role][0].id);
      await load(cl,p);
    }catch(e){setLe('Erreur : '+e.message);}
    setLl(false);
  };

  const logout=async()=>{
    if(sb) await sb.auth.signOut();
    setProfile(null);setSb(null);setContracts([]);setActive(null);
    setLf({email:'',password:''});
  };

  const refresh=useCallback(()=>{if(sb&&profile) load(sb,profile);},[sb,profile,load]);

  if(!profile) return(
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#f3f4f6'}}>
      <div style={{width:'100%',maxWidth:'380px',padding:'16px'}}>
        <div style={{textAlign:'center',marginBottom:'28px'}}>
          <div style={{fontSize:'22px',fontWeight:600,marginBottom:'4px'}}>CRM Agence</div>
          <div style={{fontSize:'13px',color:'#666'}}>Gestion commerciale · Assurance AXA</div>
        </div>
        <div className="card" style={{padding:'28px'}}>
          <div className="fg">
            <label>Email</label>
            <input type="email" value={lf.email} onChange={e=>setLf(f=>({...f,email:e.target.value}))} placeholder="prenom.nom@agence.fr" onKeyDown={e=>e.key==='Enter'&&login()}/>
          </div>
          <div className="fg">
            <label>Mot de passe</label>
            <input type="password" value={lf.password} onChange={e=>setLf(f=>({...f,password:e.target.value}))} placeholder="••••••••" onKeyDown={e=>e.key==='Enter'&&login()}/>
          </div>
          {le&&<div style={{background:'#fef2f2',color:'#b91c1c',border:'1px solid #fecaca',padding:'10px 14px',borderRadius:'8px',fontSize:'13px',marginBottom:'14px'}}>{le}</div>}
          <button className="bp" onClick={login} disabled={ll} style={{width:'100%',padding:'11px'}}>{ll?'Connexion…':'Se connecter'}</button>
        </div>
      </div>
    </div>
  );

  const nav=NAV[profile.role]||[];
  const rc=RC[profile.role];
  const ini=(profile.full_name||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();

  return(
    <div style={{display:'flex',height:'100vh',overflow:'hidden'}}>
      {/* Sidebar */}
      <div style={{width:'220px',background:'#fff',borderRight:'1px solid #e5e7eb',display:'flex',flexDirection:'column',flexShrink:0}}>
        <div style={{padding:'18px 20px 14px',borderBottom:'1px solid #e5e7eb'}}>
          <div style={{fontSize:'15px',fontWeight:600}}>CRM Agence</div>
          <div style={{fontSize:'11px',color:'#999',marginTop:'2px'}}>Assurance AXA</div>
        </div>
        <nav style={{flex:1,padding:'10px 0',overflowY:'auto'}}>
          {nav.map(n=>(
            <div key={n.id} onClick={()=>{setActive(n.id);setSelected(null);}}
              style={{display:'flex',alignItems:'center',gap:'10px',padding:'9px 20px',cursor:'pointer',fontSize:'13.5px',
                fontWeight:active===n.id?500:400,
                color:active===n.id?'#1d4ed8':'#555',
                background:active===n.id?'#eff6ff':'transparent',
                borderRight:`2px solid ${active===n.id?'#1d4ed8':'transparent'}`}}>
              <span style={{width:'16px',textAlign:'center',flexShrink:0}}>{n.icon}</span>
              {n.label}
            </div>
          ))}
        </nav>
        <div style={{padding:'14px 20px',borderTop:'1px solid #e5e7eb'}}>
          <div style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'10px'}}>
            <div style={{width:'30px',height:'30px',borderRadius:'50%',background:rc.bg,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'11px',fontWeight:600,color:rc.tx,flexShrink:0}}>{ini}</div>
            <div style={{minWidth:0}}>
              <div style={{fontSize:'13px',fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{profile.full_name}</div>
              <div style={{fontSize:'11px',color:'#999'}}>{RL[profile.role]}</div>
            </div>
          </div>
          <button onClick={logout} style={{width:'100%',fontSize:'12px',padding:'6px'}}>Déconnexion</button>
        </div>
      </div>

      {/* Main */}
      <div style={{flex:1,overflow:'auto',background:'#f9fafb'}}>
        {active==='saisir-contrat'&&
          <FormContrat sb={sb} profile={profile} profiles={profiles}
            onSaved={()=>{refresh();setActive(profile.role==='conseiller'?'mes-dossiers':'suivi-dossiers');}}/>}
        {(active==='suivi-dossiers'||active==='mes-dossiers')&&
          <SuiviDossiers contracts={contracts} profile={profile} profiles={profiles}
            onSelect={setSelected} onNew={()=>setActive('saisir-contrat')}/>}
        {!['saisir-contrat','suivi-dossiers','mes-dossiers'].includes(active)&&
          <Placeholder nav={nav} active={active}/>}
      </div>

      {selected&&
        <DetailPanel key={selected.id} contract={selected} profile={profile} sb={sb}
          onClose={()=>setSelected(null)} onRefresh={()=>{refresh();}}/>}
    </div>
  );
}

/* ═══════════════════════════════════════ FORMULAIRE */
function FormContrat({sb,profile,profiles,onSaved}){
  const makeEmpty=()=>({
    client_name:'',contract_number:'',
    emission_date:today(),effect_date:'',
    contract_type:DEFAULT_TYPES[0],
    provenance:PROVS[0],
    annual_premium:'',
    comments:'',
    conseiller_id:profile.id
  });
  const [f,setF]=useState(makeEmpty());
  const [saving,setSaving]=useState(false);
  const [err,setErr]=useState('');
  const u=(k,v)=>setF(p=>({...p,[k]:v}));
  const isDir=['direction','manager'].includes(profile.role);

  const save=async()=>{
    if(!f.client_name.trim()){setErr('Le nom du client est obligatoire.');return;}
    if(!f.contract_number.trim()){setErr('Le numéro de contrat est obligatoire.');return;}
    if(!f.emission_date){setErr("La date d'émission est obligatoire.");return;}
    if(!f.effect_date){setErr("La date d'effet est obligatoire.");return;}
    if(!f.annual_premium||parseFloat(f.annual_premium)<=0){setErr('La cotisation annuelle est obligatoire.');return;}
    setSaving(true);setErr('');
    const {error:e}=await sb.from('contracts').insert({
      conseiller_id:f.conseiller_id||profile.id,
      client_name:f.client_name.trim(),
      contract_number:f.contract_number.trim(),
      emission_date:f.emission_date,
      effect_date:f.effect_date,
      contract_type:f.contract_type,
      provenance:f.provenance,
      annual_premium:parseFloat(f.annual_premium)||0,
      commission:0,
      comments:f.comments,
    });
    if(e){setErr('Erreur : '+e.message);setSaving(false);return;}
    onSaved();
  };

  return(
    <div style={{padding:'36px 40px',maxWidth:'720px'}}>
      <div style={{marginBottom:'28px'}}>
        <div style={{fontSize:'22px',fontWeight:600,marginBottom:'4px'}}>Saisir un contrat</div>
        <div style={{fontSize:'13.5px',color:'#666'}}>Les champs * sont obligatoires</div>
      </div>
      <div className="card" style={{padding:'28px'}}>
        {isDir&&(
          <div className="fg">
            <label>Conseiller *</label>
            <select value={f.conseiller_id} onChange={e=>u('conseiller_id',e.target.value)}>
              {profiles.map(p=><option key={p.id} value={p.id}>{p.full_name} ({RL[p.role]})</option>)}
            </select>
          </div>
        )}
        <div className="fg2">
          <div className="fg">
            <label>Nom / Raison sociale *</label>
            <input value={f.client_name} onChange={e=>u('client_name',e.target.value)} placeholder="DUPONT Jean"/>
          </div>
          <div className="fg">
            <label>N° contrat *</label>
            <input value={f.contract_number} onChange={e=>u('contract_number',e.target.value)} placeholder="21021664404"/>
          </div>
        </div>
        <div className="fg2">
          <div className="fg">
            <label>Date d'émission *</label>
            <input type="date" value={f.emission_date} onChange={e=>u('emission_date',e.target.value)}/>
          </div>
          <div className="fg">
            <label>Date d'effet *</label>
            <input type="date" value={f.effect_date} onChange={e=>u('effect_date',e.target.value)}/>
          </div>
        </div>
        <div className="fg2">
          <div className="fg">
            <label>Type de contrat</label>
            <select value={f.contract_type} onChange={e=>u('contract_type',e.target.value)}>
              {DEFAULT_TYPES.map(t=><option key={t} value={t}>{t}</option>)}
            </select>
          </div>
          <div className="fg">
            <label>Provenance</label>
            <select value={f.provenance} onChange={e=>u('provenance',e.target.value)}>
              {PROVS.map(p=><option key={p} value={p}>{p}</option>)}
            </select>
          </div>
        </div>
        <div className="fg">
          <label>Cotisation annuelle TTC (€) *</label>
          <input type="number" min="0" step="0.01" value={f.annual_premium}
            onChange={e=>u('annual_premium',e.target.value)} placeholder="ex: 1250"/>
          <div style={{fontSize:'11.5px',color:'#888',marginTop:'4px'}}>
            La commission sera calculée automatiquement selon la grille en vigueur (Sprint 5).
          </div>
        </div>
        <div className="fg">
          <label>Commentaires</label>
          <textarea value={f.comments} onChange={e=>u('comments',e.target.value)} rows={3} style={{resize:'vertical'}}/>
        </div>
        {err&&<div style={{background:'#fef2f2',color:'#b91c1c',border:'1px solid #fecaca',padding:'10px 14px',borderRadius:'8px',fontSize:'13px',marginBottom:'14px'}}>{err}</div>}
        <div style={{display:'flex',gap:'10px',justifyContent:'flex-end'}}>
          <button onClick={()=>setF(makeEmpty())}>Réinitialiser</button>
          <button className="bp" onClick={save} disabled={saving}>
            {saving?'Enregistrement…':'Enregistrer le contrat'}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════ SUIVI DOSSIERS */
function SuiviDossiers({contracts,profile,profiles,onSelect,onNew}){
  const [filterConseiller,setFilterConseiller]=useState('');
  const [filterType,setFilterType]=useState('');
  const [filterStatus,setFilterStatus]=useState('');
  const [search,setSearch]=useState('');
  const isDir=['direction','manager'].includes(profile.role);

  const list=contracts.filter(c=>{
    if(filterConseiller&&c.conseiller_id!==filterConseiller) return false;
    if(filterType&&c.contract_type!==filterType) return false;
    if(filterStatus&&c.status!==filterStatus) return false;
    if(search&&!c.client_name.toLowerCase().includes(search.toLowerCase())&&!c.contract_number.includes(search)) return false;
    return true;
  });

  const hasAction=c=>c.document_tracking?.manager_comment&&!c.document_tracking?.action_done;

  return(
    <div style={{padding:'36px 40px'}}>
      <div style={{marginBottom:'20px',display:'flex',alignItems:'center',justifyContent:'space-between',gap:'12px',flexWrap:'wrap'}}>
        <div>
          <div style={{fontSize:'22px',fontWeight:600,marginBottom:'4px'}}>
            {profile.role==='conseiller'?'Mes dossiers':'Suivi des dossiers'}
          </div>
          <div style={{fontSize:'13.5px',color:'#666'}}>{list.length} contrat{list.length!==1?'s':''}</div>
        </div>
        <button className="bp" onClick={onNew}>+ Nouveau contrat</button>
      </div>

      <div style={{display:'flex',gap:'10px',marginBottom:'18px',flexWrap:'wrap'}}>
        <input value={search} onChange={e=>setSearch(e.target.value)}
          placeholder="Rechercher client ou n° contrat…" style={{maxWidth:'240px'}}/>
        {isDir&&(
          <select value={filterConseiller} onChange={e=>setFilterConseiller(e.target.value)} style={{maxWidth:'180px'}}>
            <option value="">Tous les conseillers</option>
            {profiles.filter(p=>p.role!=='direction').map(p=>
              <option key={p.id} value={p.id}>{p.full_name}</option>)}
          </select>
        )}
        <select value={filterType} onChange={e=>setFilterType(e.target.value)} style={{maxWidth:'200px'}}>
          <option value="">Tous les types</option>
          {DEFAULT_TYPES.map(t=><option key={t} value={t}>{t}</option>)}
        </select>
        <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)} style={{maxWidth:'160px'}}>
          <option value="">Tous les statuts</option>
          <option value="ENCOURS">ENCOURS</option>
          <option value="CLOTURE">CLOTURE</option>
          <option value="ANNULE">ANNULE</option>
        </select>
        {(filterConseiller||filterType||filterStatus||search)&&
          <button onClick={()=>{setFilterConseiller('');setFilterType('');setFilterStatus('');setSearch('');}}
            style={{fontSize:'12px'}}>✕ Effacer</button>}
      </div>

      <div className="card" style={{overflow:'hidden'}}>
        {list.length===0?(
          <div style={{padding:'48px',textAlign:'center',color:'#999',fontSize:'14px'}}>
            Aucun contrat{search?' pour cette recherche':''}
          </div>
        ):(
          <div style={{overflowX:'auto'}}>
            <table>
              <thead><tr>
                <th>Pièces</th>
                {isDir&&<th>Conseiller</th>}
                <th>Client</th>
                <th>N° contrat</th>
                <th>Type</th>
                <th>Date effet</th>
                <th>CA annuel</th>
                <th>Statut</th>
              </tr></thead>
              <tbody>
                {list.map(c=>{
                  const d=docStatus(c.document_tracking);
                  return(
                    <tr key={c.id} onClick={()=>onSelect(c)} style={{cursor:'pointer',
                      background:hasAction(c)&&profile.role==='conseiller'?'#fffbeb':''}}>
                      <td>
                        <span className="badge" style={{background:d.bg,color:d.tx}}>{d.l}</span>
                      </td>
                      {isDir&&<td style={{color:'#555'}}>{c.conseiller?.full_name||'—'}</td>}
                      <td style={{fontWeight:500}}>{c.client_name}</td>
                      <td style={{color:'#888',fontFamily:'monospace',fontSize:'12.5px'}}>{c.contract_number}</td>
                      <td><span className="badge" style={{background:'#f3f4f6',color:'#374151'}}>{c.contract_type}</span></td>
                      <td style={{color:'#666'}}>{fdate(c.effect_date)}</td>
                      <td style={{fontWeight:500}}>{feur(c.annual_premium)}</td>
                      <td>
                        <span className="badge" style={{
                          background:c.status==='ENCOURS'?'#dbeafe':c.status==='CLOTURE'?'#f3f4f6':'#fee2e2',
                          color:c.status==='ENCOURS'?'#1e40af':c.status==='CLOTURE'?'#374151':'#991b1b'
                        }}>{c.status}</span>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════ PANNEAU DÉTAIL */
function DetailPanel({contract,profile,sb,onClose,onRefresh}){
  const [dt,setDt]=useState(contract.document_tracking||{});
  const [mc,setMc]=useState('');
  const [cc,setCc]=useState('');
  const [monoType,setMonoType]=useState(contract.mono_type||'');
  const [saving,setSaving]=useState(false);
  const canPieces=['manager','direction'].includes(profile.role);
  const canDir=profile.role==='direction';
  const isCollab=profile.role==='conseiller';

  const updTracking=async(u)=>{
    setSaving(true);
    const {error}=await sb.from('document_tracking')
      .update({...u,updated_at:new Date().toISOString()})
      .eq('contract_id',contract.id);
    if(!error){setDt(p=>({...p,...u}));onRefresh();}
    setSaving(false);
  };

  const saveMonoType=async(val)=>{
    setMonoType(val);
    await sb.from('contracts').update({mono_type:val||null}).eq('id',contract.id);
    onRefresh();
  };

  const IR=({label,value})=>(
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'9px 0',borderBottom:'1px solid #f3f4f6',fontSize:'13.5px'}}>
      <span style={{color:'#666'}}>{label}</span>
      <span style={{fontWeight:500,textAlign:'right',maxWidth:'240px'}}>{value}</span>
    </div>
  );

  const TG=({label,field,disabled})=>(
    <div className="cr">
      <span style={{fontSize:'13.5px',color:disabled?'#aaa':'#222'}}>{label}</span>
      <label className="toggle">
        <input type="checkbox" checked={!!dt[field]} disabled={disabled||saving}
          onChange={e=>updTracking({[field]:e.target.checked})}/>
        <span className="slider"></span>
      </label>
    </div>
  );

  return(
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="panel">
        <div style={{padding:'18px 22px',borderBottom:'1px solid #e5e7eb',display:'flex',justifyContent:'space-between',alignItems:'center',position:'sticky',top:0,background:'#fff',zIndex:1}}>
          <div>
            <div style={{fontSize:'15px',fontWeight:600}}>{contract.client_name}</div>
            <div style={{fontSize:'12px',color:'#999',marginTop:'2px'}}>{contract.contract_number} · {contract.contract_type}</div>
          </div>
          <button onClick={onClose} style={{padding:'6px 10px',fontSize:'13px'}}>✕</button>
        </div>

        <div style={{padding:'22px'}}>

          {/* Infos */}
          <div style={{marginBottom:'22px'}}>
            <div className="sec">Informations</div>
            <div className="card" style={{padding:'0 16px'}}>
              <IR label="Conseiller" value={contract.conseiller?.full_name||'—'}/>
              <IR label="Date émission" value={fdate(contract.emission_date)}/>
              <IR label="Date d'effet" value={fdate(contract.effect_date)}/>
              <IR label="Provenance" value={contract.provenance||'—'}/>
              <IR label="CA annuel" value={feur(contract.annual_premium)}/>
              {['direction','manager'].includes(profile.role)&&
                <IR label="Commission" value={feur(contract.commission)}/>}
              {contract.comments&&<IR label="Commentaire" value={contract.comments}/>}
            </div>
          </div>

          {/* Mono contrat — visible par tous, modifiable direction uniquement */}
          <div style={{marginBottom:'22px'}}>
            <div className="sec">Mono contrat {!canDir&&'· lecture seule'}</div>
            <div className="card" style={{padding:'14px 16px'}}>
              {canDir?(
                <>
                  <label style={{marginBottom:'6px'}}>Type de situation</label>
                  <select value={monoType} onChange={e=>saveMonoType(e.target.value)}>
                    {MONO_OPTS.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}
                  </select>
                </>
              ):(
                <div style={{fontSize:'13.5px',fontWeight:500}}>
                  {MONO_OPTS.find(o=>o.value===monoType)?.label||'Aucun'}
                </div>
              )}
              {monoType&&(
                <div style={{fontSize:'12px',color:'#92400e',background:'#fef3c7',border:'1px solid #fde68a',borderRadius:'6px',padding:'8px 10px',marginTop:'8px'}}>
                  {monoType==='mono'&&'Cette vente ne génère pas de commission (0€).'}
                  {monoType==='mono_sante'&&'Taux de commission réduit de 1% (ex: 5% → 4%).'}
                  {monoType==='mono_pro'&&'Taux de commission réduit de 1% (ex: 3% → 2%).'}
                </div>
              )}
            </div>
          </div>

          {/* Pièces */}
          <div style={{marginBottom:'22px'}}>
            <div className="sec">Suivi des pièces {!canPieces&&'· lecture seule'}</div>
            <div className="card" style={{padding:'0 16px'}}>
              <TG label="Rentré signé" field="rented_signed" disabled={!canPieces}/>
              <TG label="Conforme KYC" field="kyc_compliant" disabled={!canPieces}/>
              <TG label="Justificatifs complets" field="docs_complete" disabled={!canPieces}/>
            </div>
          </div>

          {/* Vérif direction */}
          <div style={{marginBottom:'22px'}}>
            <div className="sec">Vérifications direction {!canDir&&'· lecture seule'}</div>
            <div className="card" style={{padding:'0 16px'}}>
              <TG label="Payé client" field="client_paid" disabled={!canDir}/>
              <TG label="Date d'effet correcte" field="effect_date_ok" disabled={!canDir}/>
            </div>
          </div>

          {/* Échanges */}
          <div>
            <div className="sec">Échanges</div>
            {dt.manager_comment&&(
              <div className="mb mbm">
                <div style={{fontSize:'11px',color:'#3b82f6',fontWeight:600,marginBottom:'4px'}}>Manager</div>
                {dt.manager_comment}
              </div>
            )}
            {dt.collab_comment&&(
              <div className="mb mbc">
                <div style={{fontSize:'11px',color:'#16a34a',fontWeight:600,marginBottom:'4px'}}>
                  Collaborateur {dt.action_done&&'· Réalisé ✓'}
                </div>
                {dt.collab_comment}
              </div>
            )}
            {canPieces&&(
              <div style={{display:'flex',gap:'8px',marginTop:'10px'}}>
                <input value={mc} onChange={e=>setMc(e.target.value)}
                  placeholder="Action requise par le collaborateur…"
                  onKeyDown={e=>{if(e.key==='Enter'&&mc.trim()){updTracking({manager_comment:mc.trim(),action_done:false});setMc('');}}}/>
                <button onClick={()=>{if(mc.trim()){updTracking({manager_comment:mc.trim(),action_done:false});setMc('');}}}
                  disabled={!mc.trim()||saving} className="bp" style={{flexShrink:0}}>Envoyer</button>
              </div>
            )}
            {isCollab&&dt.manager_comment&&!dt.action_done&&(
              <div style={{marginTop:'12px'}}>
                <div style={{background:'#fef9c3',border:'1px solid #fde68a',borderRadius:'8px',padding:'12px 14px',fontSize:'13px',marginBottom:'10px',color:'#92400e'}}>
                  <strong>Action requise :</strong> {dt.manager_comment}
                </div>
                <div style={{display:'flex',gap:'8px'}}>
                  <input value={cc} onChange={e=>setCc(e.target.value)} placeholder="Ce que vous avez fait…"/>
                  <button onClick={()=>{if(cc.trim()){updTracking({collab_comment:cc.trim(),action_done:true});setCc('');}}}
                    disabled={!cc.trim()||saving} className="bp" style={{flexShrink:0}}>Fait ✓</button>
                </div>
              </div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════ PLACEHOLDER */
function Placeholder({nav,active}){
  const item=nav?.find(n=>n.id===active);
  if(!item) return null;
  return(
    <div style={{padding:'40px'}}>
      <div style={{fontSize:'22px',fontWeight:600,marginBottom:'24px'}}>{item.label}</div>
      <div className="card" style={{padding:'60px 40px',textAlign:'center'}}>
        <div style={{fontSize:'28px',color:'#ccc',marginBottom:'14px'}}>{item.icon}</div>
        <div style={{fontSize:'15px',fontWeight:500,marginBottom:'8px'}}>Module en cours de construction</div>
        <div style={{fontSize:'13.5px',color:'#888',maxWidth:'300px',margin:'0 auto 16px',lineHeight:1.6}}>
          Ce module sera développé au Sprint {item.s}.
        </div>
        <span style={{display:'inline-block',background:'#f3f4f6',border:'1px solid #e5e7eb',borderRadius:'8px',padding:'5px 16px',fontSize:'12px',color:'#666'}}>Sprint {item.s}</span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
