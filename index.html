<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM Agence</title>
<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f9fafb;color:#111;}
input,select,textarea,button{font-family:inherit;font-size:14px;outline:none;}
input,select,textarea{display:block;width:100%;padding:9px 12px;border:1px solid #e5e7eb;border-radius:8px;background:#fff;color:#111;}
input:focus,select:focus,textarea:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,0.1);}
button{padding:9px 16px;border:1px solid #e5e7eb;border-radius:8px;background:#fff;color:#111;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
button:hover:not(:disabled){background:#f3f4f6;}
button:disabled{opacity:0.5;cursor:not-allowed;}
.bp{background:#1d4ed8;color:#fff;border-color:#1d4ed8;font-weight:500;}
.bp:hover:not(:disabled){background:#1e40af;}
label{display:block;font-size:12.5px;color:#555;margin-bottom:4px;font-weight:500;}
.fg{margin-bottom:16px;}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;}
.badge{display:inline-block;padding:2px 8px;border-radius:100px;font-size:11px;font-weight:500;white-space:nowrap;}
table{width:100%;border-collapse:collapse;font-size:12.5px;}
th{background:#f9fafb;color:#555;font-size:10.5px;font-weight:600;letter-spacing:0.4px;text-transform:uppercase;padding:9px 10px;text-align:left;border-bottom:1px solid #e5e7eb;cursor:pointer;user-select:none;white-space:nowrap;}
th:hover{background:#f3f4f6;}
td{padding:9px 10px;border-bottom:1px solid #f3f4f6;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.35);display:flex;justify-content:flex-end;z-index:100;}
.panel{background:#fff;width:520px;height:100vh;overflow-y:auto;box-shadow:-4px 0 24px rgba(0,0,0,0.12);display:flex;flex-direction:column;}
.sec{font-size:11px;font-weight:600;letter-spacing:0.8px;text-transform:uppercase;color:#999;margin-bottom:10px;}
.cr{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f3f4f6;}
.cr:last-child{border-bottom:none;}
.toggle{position:relative;display:inline-block;width:40px;height:22px;flex-shrink:0;}
.toggle input{opacity:0;width:0;height:0;position:absolute;}
.slider{position:absolute;cursor:pointer;inset:0;background:#e5e7eb;border-radius:22px;transition:.2s;}
.slider:before{position:absolute;content:"";height:16px;width:16px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s;}
.toggle input:checked+.slider{background:#22c55e;}
.toggle input:checked+.slider:before{transform:translateX(18px);}
.toggle input:disabled+.slider{opacity:.5;cursor:not-allowed;}
.chat-wrap{display:flex;flex-direction:column;gap:10px;padding:4px 0;}
.msg{max-width:82%;padding:10px 13px;font-size:13px;line-height:1.5;}
.msg-left{align-self:flex-start;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:4px 12px 12px 12px;}
.msg-right{align-self:flex-end;background:#eff6ff;border:1px solid #bfdbfe;border-radius:12px 4px 12px 12px;text-align:right;}
.msg-meta{font-size:10.5px;font-weight:600;margin-bottom:3px;}
.msg-left .msg-meta{color:#16a34a;}
.msg-right .msg-meta{color:#1d4ed8;}
.msg-time{font-size:10px;color:#999;margin-top:3px;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
.env-anim{animation:pulse 1.4s ease-in-out infinite;}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-thumb{background:#e5e7eb;border-radius:3px;}
.tip-wrap{position:relative;display:inline-flex;align-items:center;}
.tip-wrap .tip{visibility:hidden;background:#1f2937;color:#fff;font-size:11.5px;border-radius:6px;padding:6px 10px;position:absolute;z-index:20;bottom:130%;left:50%;transform:translateX(-50%);white-space:normal;max-width:240px;text-align:center;line-height:1.4;pointer-events:none;}
.tip-wrap:hover .tip{visibility:visible;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useCallback,useEffect}=React;
const SB_URL='https://hmuhuokfbfpcnovmllti.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhtdWh1b2tmYmZwY25vdm1sbHRpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2ODYyNzgsImV4cCI6MjA5MjI2MjI3OH0.aP_M2NwFa8Uk6yGFYAI6os0gNOzuulQJm2sDWIitjRQ';

const FAMILIES=[
  {name:'IARD Particulier',color:'#1d4ed8',bg:'#dbeafe',types:['Auto/Moto','MRH','PJ','Caravane/Camping-car/Remorque','EDPM','Plaisance','Scolaire','Voyage']},
  {name:'Courtage',color:'#7c3aed',bg:'#ede9fe',types:['Courtage Auto/Moto','Courtage IARD Part','Courtage Prévoyance','Courtage Santé','Courtage IARD Pro']},
  {name:'Prévoyance',color:'#0891b2',bg:'#cffafe',types:['Ma PA','Prévoyance Pro.','CAP Prévoyance Part.','CAP AVIZEN','ARC','ENTOURAGE','ESSENCIEL']},
  {name:'Santé',color:'#059669',bg:'#d1fae5',types:['Ma Santé TNS & Retraités','Ma Santé HORS TNS & Retraités','Santé AGIPI']},
  {name:'VTC',color:'#b45309',bg:'#fef3c7',types:['VTC']},
  {name:'Collectives',color:'#6366f1',bg:'#e0e7ff',types:['Collectives']},
  {name:'IARD Pro & Entreprise',color:'#dc2626',bg:'#fee2e2',types:['MRP','MRI','MRE','RC Pro.','Décennale','Bris Machine','Garages','Flotte']},
  {name:'Crédits AXA',color:'#ea580c',bg:'#ffedd5',types:['Crédit Conso. Hors Ass AXA','Crédit Conso. Avec Ass AXA']},
  {name:'AXA Banque',color:'#0284c7',bg:'#e0f2fe',types:['AXA Banque CB Visa','AXA Banque CB Premier','AXA Banque CB Infinite','Ogoon','Mobilité bancaire','Epargne (réserve, livret A, PEA, etc.)']},
  {name:'Épargne & Retraite',color:'#92400e',bg:'#fef9c3',types:['FAR Retraite (apport affaire)','Assurance Vie (apport affaire)','Ass Vie & Retraite PUVL sup 5000€','Ass Vie & Retraite PUVL sup 100000€','FAR Retraite VLP sup 1000€/an']},
  {name:'Autres',color:'#475569',bg:'#f1f5f9',types:['Autres contrats AXA']},
];
const ALL_TYPES=FAMILIES.flatMap(f=>f.types);
const getFamily=t=>FAMILIES.find(f=>f.types.includes(t));
const PROVS=['Leads / E-contact AXA','Leads / E-contact AGENCE','PRVT','Rebond','Reco','Demande du client'];
const MONO_OPTS=[{value:'',label:'Aucun'},{value:'mono',label:'Mono contrat (com = 0€)'},{value:'mono_sante',label:'Mono santé (taux − 1%)'},{value:'mono_pro',label:'Mono pro (taux − 1%)'}];
const PAY_OPTS=[{value:'non_paye',label:'Pas encore payé',bg:'#f3f4f6',tx:'#374151'},{value:'paye',label:'Payé',bg:'#d1fae5',tx:'#065f46'},{value:'impaye',label:'Impayé',bg:'#fee2e2',tx:'#991b1b'}];
const NAV={
  direction:[{id:'saisir-contrat',label:'Saisir un contrat',icon:'+'},{id:'suivi-dossiers',label:'Suivi des dossiers',icon:'≡'},{id:'tableau-bord',label:'Tableau de bord',icon:'◉',s:3},{id:'commissions',label:'Commissions',icon:'€',s:4},{id:'resiliations',label:'Résiliations',icon:'↩',s:7},{id:'salaires',label:'Salaires',icon:'∑',s:6},{id:'configuration',label:'Configuration',icon:'⚙',s:5}],
  manager:[{id:'saisir-contrat',label:'Saisir un contrat',icon:'+'},{id:'suivi-dossiers',label:'Suivi des dossiers',icon:'≡'},{id:'tableau-bord',label:'Tableau de bord',icon:'◉',s:3},{id:'commissions',label:'Commissions',icon:'€',s:4},{id:'resiliations',label:'Résiliations',icon:'↩',s:7}],
  conseiller:[{id:'saisir-contrat',label:'Saisir un contrat',icon:'+'},{id:'mes-dossiers',label:'Mes dossiers',icon:'≡'},{id:'mes-commissions',label:'Mes commissions',icon:'€',s:4}]
};
const RL={direction:'Direction',manager:'Manager',conseiller:'Conseiller'};
const RC={direction:{bg:'#dbeafe',tx:'#1e40af'},manager:{bg:'#fef3c7',tx:'#92400e'},conseiller:{bg:'#d1fae5',tx:'#065f46'}};
const today=()=>new Date().toISOString().split('T')[0];
const fdate=d=>d?new Date(d).toLocaleDateString('fr-FR'):'—';
const feur=n=>(n||n===0)?new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',minimumFractionDigits:0,maximumFractionDigits:0}).format(n):'—';
const fdt=d=>{if(!d)return '';const dt=new Date(d);return dt.toLocaleDateString('fr-FR')+' '+dt.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});};
const toUpper=s=>(s||'').toUpperCase();

function docStatus(dt){
  if(!dt) return {l:'Non vérifié',bg:'#f3f4f6',tx:'#374151'};
  if(dt.contract_nr_ok&&dt.rented_signed&&dt.kyc_compliant&&dt.docs_complete) return {l:'Dossier complet',bg:'#d1fae5',tx:'#065f46'};
  if(!dt.contract_nr_ok&&!dt.rented_signed&&!dt.kyc_compliant&&!dt.docs_complete) return {l:'Non vérifié',bg:'#f3f4f6',tx:'#374151'};
  return {l:'En cours',bg:'#fef3c7',tx:'#92400e'};
}
function payOpt(dt){return PAY_OPTS.find(p=>p.value===(dt?.payment_status||'non_paye'))||PAY_OPTS[0];}

/* ══════════════════════════════════════ APP */
function App(){
  const [profile,setProfile]=useState(null);
  const [sb,setSb]=useState(null);
  const [contracts,setContracts]=useState([]);
  const [profiles,setProfiles]=useState([]);
  const [active,setActive]=useState(null);
  const [selected,setSelected]=useState(null);
  const [reads,setReads]=useState({});
  const [lastMsgMap,setLastMsgMap]=useState({});
  const [lf,setLf]=useState({email:'',password:''});
  const [le,setLe]=useState('');
  const [ll,setLl]=useState(false);

  const load=useCallback(async(cl,p)=>{
    const {data:ps}=await cl.from('profiles').select('*').order('full_name');
    setProfiles(ps||[]);

    let q=cl.from('contracts').select('*,document_tracking(*),conseiller:conseiller_id(id,full_name,role)');
    if(p.role==='conseiller') q=q.eq('conseiller_id',p.id);
    const {data:cs}=await q.order('created_at',{ascending:false});
    setContracts(cs||[]);

    // Derniers messages par contrat
    const {data:msgs}=await cl.from('contract_messages').select('contract_id,created_at').order('created_at',{ascending:false});
    const lmm={};
    (msgs||[]).forEach(m=>{if(!lmm[m.contract_id]) lmm[m.contract_id]=m.created_at;});
    setLastMsgMap(lmm);

    // Lectures
    const {data:rs}=await cl.from('message_reads').select('contract_id,read_at').eq('user_id',p.id);
    const rm={};
    (rs||[]).forEach(r=>{rm[r.contract_id]=r.read_at;});
    setReads(rm);
  },[]);

  const login=async()=>{
    setLe('');setLl(true);
    try{
      const cl=window.supabase.createClient(SB_URL,SB_KEY);
      const {data,error:ae}=await cl.auth.signInWithPassword({email:lf.email,password:lf.password});
      if(ae){setLe(ae.message);setLl(false);return;}
      const {data:p}=await cl.from('profiles').select('*').eq('id',data.user.id).single();
      if(!p){setLe('Profil introuvable.');setLl(false);return;}
      setSb(cl);setProfile(p);setActive(NAV[p.role][0].id);
      await load(cl,p);
    }catch(e){setLe('Erreur : '+e.message);}
    setLl(false);
  };

  const logout=async()=>{if(sb)await sb.auth.signOut();setProfile(null);setSb(null);setContracts([]);setActive(null);setReads({});setLastMsgMap({});setLf({email:'',password:''});};
  const refresh=useCallback(()=>{if(sb&&profile)load(sb,profile);},[sb,profile,load]);

  const markRead=useCallback(async(contractId)=>{
    if(!sb||!profile) return;
    const now=new Date().toISOString();
    await sb.from('message_reads').upsert({user_id:profile.id,contract_id:contractId,read_at:now},{onConflict:'user_id,contract_id'});
    setReads(r=>({...r,[contractId]:now}));
  },[sb,profile]);

  if(!profile) return(
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#f3f4f6'}}>
      <div style={{width:'100%',maxWidth:'380px',padding:'16px'}}>
        <div style={{textAlign:'center',marginBottom:'28px'}}>
          <div style={{fontSize:'22px',fontWeight:600,marginBottom:'4px'}}>CRM Agence</div>
          <div style={{fontSize:'13px',color:'#666'}}>Gestion commerciale · Assurance AXA</div>
        </div>
        <div className="card" style={{padding:'28px'}}>
          <div className="fg"><label>Email</label><input type="email" value={lf.email} onChange={e=>setLf(f=>({...f,email:e.target.value}))} placeholder="prenom.nom@agence.fr" onKeyDown={e=>e.key==='Enter'&&login()}/></div>
          <div className="fg"><label>Mot de passe</label><input type="password" value={lf.password} onChange={e=>setLf(f=>({...f,password:e.target.value}))} placeholder="••••••••" onKeyDown={e=>e.key==='Enter'&&login()}/></div>
          {le&&<div style={{background:'#fef2f2',color:'#b91c1c',border:'1px solid #fecaca',padding:'10px 14px',borderRadius:'8px',fontSize:'13px',marginBottom:'14px'}}>{le}</div>}
          <button className="bp" onClick={login} disabled={ll} style={{width:'100%',padding:'11px'}}>{ll?'Connexion…':'Se connecter'}</button>
        </div>
      </div>
    </div>
  );

  const nav=NAV[profile.role]||[];
  const rc=RC[profile.role];
  const ini=(profile.full_name||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();

  return(
    <div style={{display:'flex',height:'100vh',overflow:'hidden'}}>
      <div style={{width:'220px',background:'#fff',borderRight:'1px solid #e5e7eb',display:'flex',flexDirection:'column',flexShrink:0}}>
        <div style={{padding:'18px 20px 14px',borderBottom:'1px solid #e5e7eb'}}>
          <div style={{fontSize:'15px',fontWeight:600}}>CRM Agence</div>
          <div style={{fontSize:'11px',color:'#999',marginTop:'2px'}}>Assurance AXA</div>
        </div>
        <nav style={{flex:1,padding:'10px 0',overflowY:'auto'}}>
          {nav.map(n=>(
            <div key={n.id} onClick={()=>{setActive(n.id);setSelected(null);}} style={{display:'flex',alignItems:'center',gap:'10px',padding:'9px 20px',cursor:'pointer',fontSize:'13.5px',fontWeight:active===n.id?500:400,color:active===n.id?'#1d4ed8':'#555',background:active===n.id?'#eff6ff':'transparent',borderRight:`2px solid ${active===n.id?'#1d4ed8':'transparent'}`}}>
              <span style={{width:'16px',textAlign:'center',flexShrink:0}}>{n.icon}</span>{n.label}
            </div>
          ))}
        </nav>
        <div style={{padding:'14px 20px',borderTop:'1px solid #e5e7eb'}}>
          <div style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'10px'}}>
            <div style={{width:'30px',height:'30px',borderRadius:'50%',background:rc.bg,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'11px',fontWeight:600,color:rc.tx,flexShrink:0}}>{ini}</div>
            <div style={{minWidth:0}}>
              <div style={{fontSize:'13px',fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{profile.full_name}</div>
              <div style={{fontSize:'11px',color:'#999'}}>{RL[profile.role]}</div>
            </div>
          </div>
          <button onClick={logout} style={{width:'100%',fontSize:'12px',padding:'6px'}}>Déconnexion</button>
        </div>
      </div>

      <div style={{flex:1,overflow:'auto',background:'#f9fafb'}}>
        {active==='saisir-contrat'&&<FormContrat sb={sb} profile={profile} profiles={profiles} onSaved={()=>{refresh();setActive(profile.role==='conseiller'?'mes-dossiers':'suivi-dossiers');}}/>}
        {(active==='suivi-dossiers'||active==='mes-dossiers')&&<SuiviDossiers contracts={contracts} profile={profile} profiles={profiles} reads={reads} lastMsgMap={lastMsgMap} onSelect={c=>{setSelected(c);markRead(c.id);}} onNew={()=>setActive('saisir-contrat')}/>}
        {!['saisir-contrat','suivi-dossiers','mes-dossiers'].includes(active)&&<Placeholder nav={nav} active={active}/>}
      </div>

      {selected&&<DetailPanel key={selected.id} contract={selected} profile={profile} profiles={profiles} sb={sb} onClose={()=>setSelected(null)} onRefresh={refresh}/>}
    </div>
  );
}

/* ══════════════════════════════════════ FORMULAIRE */
function FormContrat({sb,profile,profiles,onSaved}){
  const mk=()=>({client_name:'',contract_number:'',emission_date:today(),effect_date:'',contract_type:ALL_TYPES[0],provenance:PROVS[0],annual_premium:'',comments:'',conseiller_id:profile.id});
  const [f,setF]=useState(mk());
  const [saving,setSaving]=useState(false);
  const [err,setErr]=useState('');
  const u=(k,v)=>setF(p=>({...p,[k]:v}));
  const isDir=['direction','manager'].includes(profile.role);
  const fam=getFamily(f.contract_type);

  const save=async()=>{
    if(!f.client_name.trim()){setErr('Le nom du client est obligatoire.');return;}
    if(!f.contract_number.trim()){setErr('Le numéro de contrat est obligatoire.');return;}
    if(!f.emission_date){setErr("La date d'émission est obligatoire.");return;}
    if(!f.effect_date){setErr("La date d'effet est obligatoire.");return;}
    if(!f.annual_premium||parseFloat(f.annual_premium)<=0){setErr('La prime annuelle est obligatoire.');return;}
    setSaving(true);setErr('');
    const {error:e}=await sb.from('contracts').insert({conseiller_id:f.conseiller_id||profile.id,client_name:toUpper(f.client_name.trim()),contract_number:f.contract_number.trim(),emission_date:f.emission_date,effect_date:f.effect_date,contract_type:f.contract_type,provenance:f.provenance,annual_premium:parseFloat(f.annual_premium)||0,commission:0,comments:f.comments});
    if(e){setErr('Erreur : '+e.message);setSaving(false);return;}
    onSaved();
  };

  return(
    <div style={{padding:'36px 40px',maxWidth:'720px'}}>
      <div style={{marginBottom:'28px'}}><div style={{fontSize:'22px',fontWeight:600,marginBottom:'4px'}}>Saisir un contrat</div><div style={{fontSize:'13.5px',color:'#666'}}>Les champs * sont obligatoires</div></div>
      <div className="card" style={{padding:'28px'}}>
        {isDir&&<div className="fg"><label>Conseiller *</label><select value={f.conseiller_id} onChange={e=>u('conseiller_id',e.target.value)}>{profiles.map(p=><option key={p.id} value={p.id}>{p.full_name} ({RL[p.role]})</option>)}</select></div>}
        <div className="fg2">
          <div className="fg"><label>Nom / Raison sociale *</label><input value={f.client_name} onChange={e=>u('client_name',e.target.value)} onBlur={e=>u('client_name',toUpper(e.target.value))} placeholder="DUPONT JEAN"/></div>
          <div className="fg">
            <label style={{display:'flex',alignItems:'center',gap:'6px'}}>
              N° contrat *
              <div className="tip-wrap">
                <span style={{display:'inline-flex',alignItems:'center',justifyContent:'center',width:'15px',height:'15px',borderRadius:'50%',background:'#e5e7eb',color:'#555',fontSize:'10px',fontWeight:700,cursor:'help',flexShrink:0}}>?</span>
                <span className="tip">Sans n° de contrat, indiquez la nature : "Courtage", "Banque", etc.</span>
              </div>
            </label>
            <input value={f.contract_number} onChange={e=>u('contract_number',e.target.value)} placeholder="N° ou ex: Courtage, Banque…"/>
          </div>
        </div>
        <div className="fg2">
          <div className="fg"><label>Date d'émission *</label><input type="date" value={f.emission_date} onChange={e=>u('emission_date',e.target.value)}/></div>
          <div className="fg"><label>Date d'effet *</label><input type="date" value={f.effect_date} onChange={e=>u('effect_date',e.target.value)}/></div>
        </div>
        <div className="fg2">
          <div className="fg">
            <label>Type de contrat</label>
            <select value={f.contract_type} onChange={e=>u('contract_type',e.target.value)}>
              {FAMILIES.map(fam=><optgroup key={fam.name} label={fam.name}>{fam.types.map(t=><option key={t} value={t}>{t}</option>)}</optgroup>)}
            </select>
            {fam&&<div style={{fontSize:'11px',marginTop:'4px',color:fam.color,fontWeight:500}}>Famille : {fam.name}</div>}
          </div>
          <div className="fg"><label>Provenance</label><select value={f.provenance} onChange={e=>u('provenance',e.target.value)}>{PROVS.map(p=><option key={p} value={p}>{p}</option>)}</select></div>
        </div>
        <div className="fg"><label>Prime annuelle TTC (€) *</label><input type="number" min="0" step="0.01" value={f.annual_premium} onChange={e=>u('annual_premium',e.target.value)} placeholder="ex: 1 250"/><div style={{fontSize:'11.5px',color:'#888',marginTop:'4px'}}>La commission sera calculée automatiquement selon la grille (Sprint 5).</div></div>
        <div className="fg"><label>Commentaires</label><textarea value={f.comments} onChange={e=>u('comments',e.target.value)} rows={3} style={{resize:'vertical'}}/></div>
        {err&&<div style={{background:'#fef2f2',color:'#b91c1c',border:'1px solid #fecaca',padding:'10px 14px',borderRadius:'8px',fontSize:'13px',marginBottom:'14px'}}>{err}</div>}
        <div style={{display:'flex',gap:'10px',justifyContent:'flex-end'}}>
          <button onClick={()=>setF(mk())}>Réinitialiser</button>
          <button className="bp" onClick={save} disabled={saving}>{saving?'Enregistrement…':'Enregistrer le contrat'}</button>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════ TABLEAU */
function SuiviDossiers({contracts,profile,profiles,reads,lastMsgMap,onSelect,onNew}){
  const [fCons,setFCons]=useState('');
  const [fType,setFType]=useState('');
  const [fStat,setFStat]=useState('');
  const [fDoss,setFDoss]=useState('');
  const [fPay,setFPay]=useState('');
  const [search,setSearch]=useState('');
  const [sort,setSort]=useState({col:'created_at',asc:false});

  const sortBy=col=>setSort(s=>s.col===col?{col,asc:!s.asc}:{col,asc:true});

  const list=contracts.filter(c=>{
    if(fCons&&c.conseiller_id!==fCons) return false;
    if(fType&&c.contract_type!==fType) return false;
    if(fStat&&c.status!==fStat) return false;
    if(fDoss){const ds=docStatus(c.document_tracking);if(ds.l!==fDoss) return false;}
    if(fPay&&(c.document_tracking?.payment_status||'non_paye')!==fPay) return false;
    if(search&&!c.client_name.toLowerCase().includes(search.toLowerCase())&&!c.contract_number.includes(search)) return false;
    return true;
  }).sort((a,b)=>{
    let va=a[sort.col],vb=b[sort.col];
    if(sort.col==='dossier'){va=docStatus(a.document_tracking).l;vb=docStatus(b.document_tracking).l;}
    if(sort.col==='paiement'){va=a.document_tracking?.payment_status||'';vb=b.document_tracking?.payment_status||'';}
    if(sort.col==='conseiller'){va=a.conseiller?.full_name||'';vb=b.conseiller?.full_name||'';}
    if(va<vb) return sort.asc?-1:1;
    if(va>vb) return sort.asc?1:-1;
    return 0;
  });

  const SH=({col,children})=>{
    const on=sort.col===col;
    return <th onClick={()=>sortBy(col)} style={{background:on?'#eff6ff':''}}>{children}{on?(sort.asc?' ↑':' ↓'):' ↕'}</th>;
  };

  return(
    <div style={{padding:'28px 32px'}}>
      <div style={{marginBottom:'18px',display:'flex',alignItems:'center',justifyContent:'space-between',gap:'12px',flexWrap:'wrap'}}>
        <div>
          <div style={{fontSize:'22px',fontWeight:600,marginBottom:'4px'}}>{profile.role==='conseiller'?'Mes dossiers':'Suivi des dossiers'}</div>
          <div style={{fontSize:'13px',color:'#666'}}>{list.length} contrat{list.length!==1?'s':''}</div>
        </div>
        <button className="bp" onClick={onNew}>+ Nouveau contrat</button>
      </div>
      <div style={{display:'flex',gap:'8px',marginBottom:'14px',flexWrap:'wrap'}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Client ou n° contrat…" style={{maxWidth:'200px'}}/>
        <select value={fCons} onChange={e=>setFCons(e.target.value)} style={{maxWidth:'160px'}}><option value="">Tous conseillers</option>{profiles.map(p=><option key={p.id} value={p.id}>{p.full_name}</option>)}</select>
        <select value={fType} onChange={e=>setFType(e.target.value)} style={{maxWidth:'170px'}}><option value="">Tous types</option>{FAMILIES.map(f=><optgroup key={f.name} label={f.name}>{f.types.map(t=><option key={t} value={t}>{t}</option>)}</optgroup>)}</select>
        <select value={fDoss} onChange={e=>setFDoss(e.target.value)} style={{maxWidth:'155px'}}><option value="">Tous dossiers</option><option value="Dossier complet">Dossier complet</option><option value="En cours">En cours</option><option value="Non vérifié">Non vérifié</option></select>
        <select value={fPay} onChange={e=>setFPay(e.target.value)} style={{maxWidth:'155px'}}><option value="">Tous paiements</option>{PAY_OPTS.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}</select>
        <select value={fStat} onChange={e=>setFStat(e.target.value)} style={{maxWidth:'140px'}}><option value="">Tous statuts</option><option value="ENCOURS">ENCOURS</option><option value="CLOTURE">CLOTURE</option><option value="ANNULE">ANNULE</option></select>
        {(fCons||fType||fStat||fDoss||fPay||search)&&<button onClick={()=>{setFCons('');setFType('');setFStat('');setFDoss('');setFPay('');setSearch('');}} style={{fontSize:'12px'}}>✕ Effacer</button>}
      </div>

      <div className="card" style={{overflow:'hidden'}}>
        {list.length===0?(
          <div style={{padding:'48px',textAlign:'center',color:'#999',fontSize:'14px'}}>Aucun contrat</div>
        ):(
          <div style={{overflowX:'auto'}}>
            <table>
              <thead><tr>
                <SH col="conseiller">Conseiller</SH>
                <SH col="client_name">Client</SH>
                <SH col="contract_number">N° contrat</SH>
                <SH col="emission_date">Date émission</SH>
                <SH col="effect_date">Date effet</SH>
                <th>Type</th>
                <SH col="annual_premium">Prime annuelle</SH>
                <SH col="dossier">Dossier</SH>
                <SH col="paiement">Paiement</SH>
                <SH col="status">Statut</SH>
              </tr></thead>
              <tbody>
                {list.map(c=>{
                  const ds=docStatus(c.document_tracking);
                  const ps=payOpt(c.document_tracking);
                  const hasProb=c.document_tracking?.has_problem;
                  const annReq=c.annulation_requested;
                  const annOk=c.status==='ANNULE';
                  const fam=getFamily(c.contract_type);
                  const lastMsg=lastMsgMap[c.id];
                  const lastRead=reads[c.id];
                  const hasUnread=lastMsg&&(!lastRead||new Date(lastMsg)>new Date(lastRead));

                  // Couleurs de ligne
                  const rowBg=annOk?'#374151':annReq?'#d1d5db':hasProb?'#fff5f5':'';
                  const textColor=annOk?'#f3f4f6':annReq?'#1f2937':'#333';
                  const mutedColor=annOk?'#9ca3af':annReq?'#4b5563':'#666';

                  return(
                    <tr key={c.id} onClick={()=>onSelect(c)} style={{cursor:'pointer',background:rowBg,color:textColor}}>
                      <td style={{color:mutedColor,fontSize:'12.5px'}}>{c.conseiller?.full_name||'—'}</td>
                      <td style={{fontWeight:500,color:textColor}}>
                        <div style={{display:'flex',alignItems:'center',gap:'6px'}}>
                          {c.client_name}
                          {hasUnread&&(
                            <span className="env-anim" title="Nouveau message" style={{fontSize:'13px',color:'#f59e0b'}}>✉</span>
                          )}
                        </div>
                      </td>
                      <td style={{color:mutedColor,fontFamily:'monospace',fontSize:'11.5px'}}>{c.contract_number}</td>
                      <td style={{color:mutedColor,whiteSpace:'nowrap'}}>{fdate(c.emission_date)}</td>
                      <td style={{color:mutedColor,whiteSpace:'nowrap'}}>{fdate(c.effect_date)}</td>
                      <td>
                        {fam
                          ? <span className="badge" style={{background:annOk?'#4b5563':annReq?'#9ca3af':fam.bg,color:annOk?'#e5e7eb':annReq?'#374151':fam.color}}>{c.contract_type}</span>
                          : <span className="badge" style={{background:'#f3f4f6',color:'#374151'}}>{c.contract_type}</span>
                        }
                      </td>
                      <td style={{fontWeight:500,whiteSpace:'nowrap',color:textColor}}>{feur(c.annual_premium)}</td>
                      <td>
                        <div style={{display:'flex',alignItems:'center',gap:'4px',flexWrap:'wrap'}}>
                          {annOk
                            ? <span className="badge" style={{background:'#111',color:'#f9fafb'}}>Annulé</span>
                            : <span className="badge" style={{background:ds.bg,color:ds.tx}}>{ds.l}</span>
                          }
                          {annReq&&!annOk&&<span className="badge" style={{background:'#4b5563',color:'#f3f4f6'}}>Annulation dem.</span>}
                          {hasProb&&<span className="badge" style={{background:'#fee2e2',color:'#991b1b'}}>⚠ Problème</span>}
                        </div>
                      </td>
                      <td><span className="badge" style={{background:ps.bg,color:ps.tx}}>{ps.label}</span></td>
                      <td>
                        <span className="badge" style={{background:annOk?'#111':c.status==='ENCOURS'?'#dbeafe':'#f3f4f6',color:annOk?'#f9fafb':c.status==='ENCOURS'?'#1e40af':'#374151'}}>
                          {c.status}
                        </span>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════ PANNEAU DÉTAIL */
function DetailPanel({contract,profile,profiles,sb,onClose,onRefresh}){
  const [dt,setDt]=useState(contract.document_tracking||{});
  const [monoType,setMonoType]=useState(contract.mono_type||'');
  const [annReq,setAnnReq]=useState(contract.annulation_requested||false);
  const [isAnnule,setIsAnnule]=useState(contract.status==='ANNULE');
  const [editing,setEditing]=useState(false);
  const [editF,setEditF]=useState({client_name:contract.client_name,emission_date:contract.emission_date,effect_date:contract.effect_date,provenance:contract.provenance||'',annual_premium:contract.annual_premium||0,commission:contract.commission||0,conseiller_id:contract.conseiller_id,contract_type:contract.contract_type,contract_number:contract.contract_number});
  const [messages,setMessages]=useState([]);
  const [newMsg,setNewMsg]=useState('');
  const [saving,setSaving]=useState(false);
  const canDir=profile.role==='direction';
  const canPieces=['manager','direction'].includes(profile.role);
  const isCollab=profile.role==='conseiller';

  const loadMsgs=useCallback(async()=>{
    const {data}=await sb.from('contract_messages').select('*').eq('contract_id',contract.id).order('created_at',{ascending:true});
    setMessages(data||[]);
  },[sb,contract.id]);

  useEffect(()=>{loadMsgs();},[loadMsgs]);

  const updDt=async(u)=>{
    setSaving(true);
    await sb.from('document_tracking').update({...u,updated_at:new Date().toISOString()}).eq('contract_id',contract.id);
    setDt(p=>({...p,...u}));onRefresh();setSaving(false);
  };

  const saveEdit=async()=>{
    setSaving(true);
    await sb.from('contracts').update({client_name:toUpper(editF.client_name),emission_date:editF.emission_date,effect_date:editF.effect_date,provenance:editF.provenance,annual_premium:parseFloat(editF.annual_premium)||0,commission:parseFloat(editF.commission)||0,conseiller_id:editF.conseiller_id,contract_type:editF.contract_type,contract_number:editF.contract_number}).eq('id',contract.id);
    setEditing(false);onRefresh();setSaving(false);
  };

  const saveMonoType=async(val)=>{setMonoType(val);await sb.from('contracts').update({mono_type:val||null}).eq('id',contract.id);onRefresh();};

  const toggleAnnReq=async()=>{
    const v=!annReq;setAnnReq(v);
    await sb.from('contracts').update({annulation_requested:v}).eq('id',contract.id);
    onRefresh();
  };

  const toggleAnnule=async(v)=>{
    setIsAnnule(v);
    await sb.from('contracts').update({status:v?'ANNULE':'ENCOURS'}).eq('id',contract.id);
    onRefresh();
  };

  const sendMsg=async()=>{
    if(!newMsg.trim()) return;
    setSaving(true);
    await sb.from('contract_messages').insert({contract_id:contract.id,author_id:profile.id,author_name:profile.full_name,author_role:profile.role,message:newMsg.trim(),resolved_status:'pending'});
    setNewMsg('');await loadMsgs();setSaving(false);
  };

  const setMsgStatus=async(id,status)=>{
    await sb.from('contract_messages').update({resolved_status:status,is_resolved:status==='resolved'}).eq('id',id);
    await loadMsgs();
  };

  const TG=({label,field,disabled,blackChecked})=>(
    <div className="cr">
      <span style={{fontSize:'13.5px',color:disabled?'#aaa':'#222'}}>{label}</span>
      <label className="toggle">
        <input type="checkbox" checked={!!dt[field]} disabled={disabled||saving} onChange={e=>updDt({[field]:e.target.checked})}/>
        <span className="slider" style={blackChecked&&dt[field]?{background:'#111'}:{}}></span>
      </label>
    </div>
  );

  const IR=({label,value})=>(
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'9px 0',borderBottom:'1px solid #f3f4f6',fontSize:'13.5px'}}>
      <span style={{color:'#666'}}>{label}</span><span style={{fontWeight:500}}>{value}</span>
    </div>
  );

  const eu=(k,v)=>setEditF(p=>({...p,[k]:v}));
  const fam=getFamily(contract.contract_type);
  const headerBg=isAnnule?'#1f2937':annReq?'#374151':'#fff';
  const headerTx=isAnnule||annReq?'#f3f4f6':'#111';

  return(
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="panel">
        {/* Header */}
        <div style={{padding:'16px 20px',borderBottom:'1px solid #e5e7eb',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0,background:headerBg,transition:'background 0.2s'}}>
          <div>
            <div style={{fontSize:'15px',fontWeight:600,color:headerTx}}>{contract.client_name}</div>
            <div style={{display:'flex',alignItems:'center',gap:'6px',marginTop:'3px',flexWrap:'wrap'}}>
              <span style={{fontSize:'12px',color:isAnnule||annReq?'#9ca3af':'#999'}}>{contract.contract_number}</span>
              {fam&&<span className="badge" style={{background:isAnnule||annReq?'#4b5563':fam.bg,color:isAnnule||annReq?'#d1d5db':fam.color,fontSize:'10.5px'}}>{contract.contract_type}</span>}
              {isAnnule&&<span className="badge" style={{background:'#111',color:'#f9fafb',fontSize:'10.5px'}}>ANNULÉ</span>}
            </div>
          </div>
          <div style={{display:'flex',gap:'6px'}}>
            {canDir&&!editing&&<button onClick={()=>setEditing(true)} style={{fontSize:'12px',padding:'5px 10px'}}>✏️ Modifier</button>}
            <button onClick={onClose} style={{padding:'6px 10px',fontSize:'13px'}}>✕</button>
          </div>
        </div>

        <div style={{flex:1,overflowY:'auto',padding:'20px'}}>

          {/* Infos */}
          <div style={{marginBottom:'20px'}}>
            <div className="sec">Informations</div>
            {editing?(
              <div className="card" style={{padding:'16px'}}>
                <div className="fg"><label>Conseiller</label><select value={editF.conseiller_id} onChange={e=>eu('conseiller_id',e.target.value)}>{profiles.map(p=><option key={p.id} value={p.id}>{p.full_name}</option>)}</select></div>
                <div className="fg"><label>Nom / Raison sociale</label><input value={editF.client_name} onChange={e=>eu('client_name',e.target.value)} onBlur={e=>eu('client_name',toUpper(e.target.value))}/></div>
                <div className="fg"><label>N° contrat</label><input value={editF.contract_number} onChange={e=>eu('contract_number',e.target.value)}/></div>
                <div className="fg2">
                  <div className="fg"><label>Date émission</label><input type="date" value={editF.emission_date} onChange={e=>eu('emission_date',e.target.value)}/></div>
                  <div className="fg"><label>Date d'effet</label><input type="date" value={editF.effect_date} onChange={e=>eu('effect_date',e.target.value)}/></div>
                </div>
                <div className="fg"><label>Type de contrat</label><select value={editF.contract_type} onChange={e=>eu('contract_type',e.target.value)}>{FAMILIES.map(f=><optgroup key={f.name} label={f.name}>{f.types.map(t=><option key={t} value={t}>{t}</option>)}</optgroup>)}</select></div>
                <div className="fg"><label>Provenance</label><select value={editF.provenance} onChange={e=>eu('provenance',e.target.value)}>{PROVS.map(p=><option key={p} value={p}>{p}</option>)}</select></div>
                <div className="fg2">
                  <div className="fg"><label>Prime annuelle (€)</label><input type="number" value={editF.annual_premium} onChange={e=>eu('annual_premium',e.target.value)}/></div>
                  <div className="fg"><label>Commission (€)</label><input type="number" value={editF.commission} onChange={e=>eu('commission',e.target.value)}/></div>
                </div>
                <div style={{display:'flex',gap:'8px',justifyContent:'flex-end'}}>
                  <button onClick={()=>setEditing(false)}>Annuler</button>
                  <button className="bp" onClick={saveEdit} disabled={saving}>Enregistrer</button>
                </div>
              </div>
            ):(
              <div className="card" style={{padding:'0 16px'}}>
                <IR label="Conseiller" value={contract.conseiller?.full_name||'—'}/>
                <IR label="N° contrat" value={
                  <span style={{display:'flex',alignItems:'center',gap:'6px'}}>
                    {contract.contract_number||'—'}
                    {contract.contract_number&&(
                      <span onClick={e=>{e.stopPropagation();navigator.clipboard.writeText(contract.contract_number);}} title="Copier" style={{cursor:'pointer',fontSize:'12px',color:'#3b82f6',padding:'1px 4px',border:'1px solid #bfdbfe',borderRadius:'4px',background:'#eff6ff',userSelect:'none'}}>⧉</span>
                    )}
                  </span>
                }/>
                <IR label="Date émission" value={fdate(contract.emission_date)}/>
                <IR label="Date d'effet" value={fdate(contract.effect_date)}/>
                <IR label="Provenance" value={contract.provenance||'—'}/>
                <IR label="Prime annuelle" value={feur(contract.annual_premium)}/>
                {!isCollab&&<IR label="Commission" value={feur(contract.commission)}/>}
                {contract.comments&&<IR label="Commentaire" value={contract.comments}/>}
              </div>
            )}
          </div>

          {/* Suivi de dossier */}
          <div style={{marginBottom:'20px'}}>
            <div className="sec">Suivi de dossier {!canPieces&&'· lecture seule'}</div>
            <div className="card" style={{padding:'0 16px'}}>
              <TG label="N° de contrat conforme" field="contract_nr_ok" disabled={!canPieces}/>
              <TG label="Rentré signé" field="rented_signed" disabled={!canPieces}/>
              <TG label="Conforme KYC" field="kyc_compliant" disabled={!canPieces}/>
              <TG label="Justificatifs complets" field="docs_complete" disabled={!canPieces}/>
            </div>
            {canPieces&&(
              <button onClick={()=>updDt({has_problem:!dt.has_problem})}
                style={{marginTop:'8px',width:'100%',padding:'9px',fontSize:'12.5px',display:'flex',alignItems:'center',justifyContent:'center',gap:'6px',
                  background:dt.has_problem?'rgba(185,28,28,0.08)':'transparent',
                  color:dt.has_problem?'#b91c1c':'#555',
                  border:`1px solid ${dt.has_problem?'#fecaca':'#e5e7eb'}`,
                  borderRadius:'8px'}}>
                {dt.has_problem?'⚠️ Problème signalé — Cliquer pour lever':'⚠️ Signaler un problème sur ce dossier'}
              </button>
            )}
          </div>

          {/* Vérifications direction */}
          <div style={{marginBottom:'20px'}}>
            <div className="sec">Vérifications direction {!canDir&&'· lecture seule'}</div>
            <div className="card" style={{padding:'0 16px'}}>
              <TG label="Dates correctes" field="effect_date_ok" disabled={!canDir}/>
              {/* Mono contrat */}
              <div style={{padding:'12px 0',borderBottom:'1px solid #f3f4f6'}}>
                <div style={{fontSize:'13.5px',color:canDir?'#222':'#aaa',marginBottom:'8px'}}>Mono contrat</div>
                <div style={{display:'flex',flexDirection:'column',gap:'6px'}}>
                  {MONO_OPTS.map(o=>(
                    <label key={o.value} style={{display:'flex',alignItems:'center',gap:'8px',cursor:canDir?'pointer':'not-allowed',opacity:canDir?1:0.5,padding:'7px 10px',border:`1px solid ${monoType===o.value&&o.value?'#3b82f6':'#e5e7eb'}`,borderRadius:'8px',background:monoType===o.value&&o.value?'#eff6ff':'#fff',fontSize:'13px'}}>
                      <input type="radio" name={`mono_${contract.id}`} value={o.value} checked={monoType===o.value} disabled={!canDir} onChange={()=>saveMonoType(o.value)} style={{width:'auto',display:'inline',padding:0,border:'none',background:'none',cursor:canDir?'pointer':'not-allowed'}}/>
                      {o.label}
                    </label>
                  ))}
                </div>
              </div>
              {/* Cotisation payée */}
              <div style={{padding:'12px 0',borderBottom:'1px solid #f3f4f6'}}>
                <div style={{fontSize:'13.5px',color:canDir?'#222':'#aaa',marginBottom:'8px'}}>Cotisation payée</div>
                <div style={{display:'flex',flexDirection:'column',gap:'6px'}}>
                  {PAY_OPTS.map(o=>(
                    <label key={o.value} style={{display:'flex',alignItems:'center',gap:'8px',cursor:canDir?'pointer':'not-allowed',opacity:canDir?1:0.5,padding:'7px 10px',border:`1px solid ${(dt.payment_status||'non_paye')===o.value?'#aaa':'#e5e7eb'}`,borderRadius:'8px',background:(dt.payment_status||'non_paye')===o.value?o.bg:'#fff',color:o.tx,fontSize:'13px'}}>
                      <input type="radio" name={`pay_${contract.id}`} value={o.value} checked={(dt.payment_status||'non_paye')===o.value} disabled={!canDir} onChange={()=>canDir&&updDt({payment_status:o.value})} style={{width:'auto',display:'inline',padding:0,border:'none',background:'none',cursor:canDir?'pointer':'not-allowed'}}/>
                      {o.label}
                    </label>
                  ))}
                </div>
              </div>
              {/* Annulation direction */}
              <div className="cr">
                <span style={{fontSize:'13.5px',color:canDir?'#222':'#aaa'}}>Annuler le dossier</span>
                <label className="toggle" style={{cursor:canDir?'pointer':'not-allowed'}}>
                  <input type="checkbox" checked={isAnnule} disabled={!canDir||saving} onChange={e=>toggleAnnule(e.target.checked)}/>
                  <span className="slider" style={{background:isAnnule?'#111':''}}></span>
                </label>
              </div>
            </div>
          </div>

          {/* Échanges */}
          <div style={{marginBottom:'20px'}}>
            <div className="sec">Échanges</div>
            <div className="chat-wrap">
              {messages.length===0&&<div style={{fontSize:'13px',color:'#aaa',textAlign:'center',padding:'16px'}}>Aucun échange pour l'instant.</div>}
              {messages.map(m=>{
                const isRight=['manager','direction'].includes(m.author_role);
                const status=m.resolved_status||'pending';
                return(
                  <div key={m.id} style={{display:'flex',flexDirection:'column',alignItems:isRight?'flex-end':'flex-start'}}>
                    <div className={`msg ${isRight?'msg-right':'msg-left'}`}>
                      <div className="msg-meta">{m.author_name}</div>
                      <div>{m.message}</div>
                      <div className="msg-time">
                        {fdt(m.created_at)}
                        {status==='resolved'&&<span style={{color:'#16a34a',fontWeight:700,marginLeft:'6px'}}>✓ Résolu</span>}
                        {status==='unresolved'&&<span style={{color:'#dc2626',fontWeight:700,marginLeft:'6px'}}>✗ Non résolu</span>}
                      </div>
                    </div>
                    {m.author_role==='conseiller'&&canPieces&&(
                      <div style={{display:'flex',gap:'6px',marginTop:'4px'}}>
                        {status!=='resolved'&&<button onClick={()=>setMsgStatus(m.id,'resolved')} style={{fontSize:'11px',padding:'3px 10px',color:'#16a34a',border:'1px solid #bbf7d0',background:'#f0fdf4',borderRadius:'6px'}}>✓ Résolu</button>}
                        {status!=='unresolved'&&<button onClick={()=>setMsgStatus(m.id,'unresolved')} style={{fontSize:'11px',padding:'3px 10px',color:'#dc2626',border:'1px solid #fecaca',background:'#fef2f2',borderRadius:'6px'}}>✗ Non résolu</button>}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
            <div style={{display:'flex',gap:'8px',marginTop:'12px'}}>
              <textarea value={newMsg} onChange={e=>setNewMsg(e.target.value)} placeholder="Écrire un message…" rows={2} style={{resize:'none',flex:1}} onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}}}/>
              <button onClick={sendMsg} disabled={!newMsg.trim()||saving} className="bp" style={{flexShrink:0,alignSelf:'flex-end'}}>Envoyer</button>
            </div>
            <div style={{fontSize:'11px',color:'#aaa',marginTop:'4px'}}>Entrée pour envoyer · Shift+Entrée pour saut de ligne</div>
          </div>

          {/* Bouton annulation demande — tous sauf direction qui a la vraie annulation */}
          {!isAnnule&&(
            <button onClick={toggleAnnReq}
              style={{width:'100%',padding:'10px',fontSize:'13px',display:'flex',alignItems:'center',justifyContent:'center',gap:'8px',borderRadius:'8px',transition:'all 0.15s',
                background:annReq?'rgba(0,0,0,0.75)':'rgba(0,0,0,0.06)',
                color:annReq?'#f9fafb':'#333',
                border:`1px solid ${annReq?'#374151':'rgba(0,0,0,0.15)'}`}}>
              {annReq?'⬛ Annulation demandée — Annuler la demande':'⬛ Signaler annulation de ce dossier'}
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

function Placeholder({nav,active}){
  const item=nav?.find(n=>n.id===active);
  if(!item) return null;
  return(
    <div style={{padding:'40px'}}>
      <div style={{fontSize:'22px',fontWeight:600,marginBottom:'24px'}}>{item.label}</div>
      <div className="card" style={{padding:'60px 40px',textAlign:'center'}}>
        <div style={{fontSize:'28px',color:'#ccc',marginBottom:'14px'}}>{item.icon}</div>
        <div style={{fontSize:'15px',fontWeight:500,marginBottom:'8px'}}>Module en cours de construction</div>
        <div style={{fontSize:'13.5px',color:'#888',maxWidth:'300px',margin:'0 auto 16px',lineHeight:1.6}}>Ce module sera développé au Sprint {item.s}.</div>
        <span style={{display:'inline-block',background:'#f3f4f6',border:'1px solid #e5e7eb',borderRadius:'8px',padding:'5px 16px',fontSize:'12px',color:'#666'}}>Sprint {item.s}</span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
